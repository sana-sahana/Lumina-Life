<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuminaLife · Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ════════════════════════════════════════════════════════
   ULTRA PREMIUM GLASSMORPHISM DESIGN
════════════════════════════════════════════════════════ */
:root {
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-border: rgba(255, 255, 255, 0.25);
  --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
  --glass-blur: blur(24px) saturate(180%);
  
  --crimson: #C4183C;
  --crimson-glow: rgba(196, 24, 60, 0.15);
  --crimson-l: #E2264F;
  --rose: #F9A8B8;
  --rose-l: #FDDEE5;
  --sage: #7BB597;
  --sage-glow: rgba(123, 181, 151, 0.15);
  --amber: #F0A855;
  --gold: #D4A055;
  --sky: #38BDF8;
  --purple: #8B5CF6;
  --navy: #0A1628;
  --text: #0A1628;
  --text-muted: #6B7280;
  --bg: #F0F2F6;
  --bg-glass: rgba(255,255,255,0.3);
}

[data-theme="dark"] {
  --glass-bg: rgba(15, 23, 42, 0.65);
  --glass-border: rgba(255, 255, 255, 0.06);
  --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
  --bg: #080C18;
  --text: #F2F5FA;
  --text-muted: #94A3B8;
  --bg-glass: rgba(15, 23, 42, 0.3);
  --crimson-glow: rgba(196, 24, 60, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .4s ease, color .4s ease;
  overflow-x: hidden;
}

/* ── FLOATING PARTICLES ── */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
  animation: float-particle linear infinite;
}
@keyframes float-particle {
  0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-10vh) rotate(720deg) scale(1); opacity: 0; }
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  left: 16px;
  top: 16px;
  bottom: 16px;
  width: 64px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.2rem 0;
  z-index: 100;
  transition: all .4s ease;
}
.sidebar:hover {
  background: var(--glass-bg);
  box-shadow: 0 12px 48px rgba(0,0,0,0.08);
}
.sidebar-logo {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: white;
  box-shadow: 0 4px 20px var(--crimson-glow);
  cursor: pointer;
  transition: all .3s ease;
  margin-bottom: 1.8rem;
  flex-shrink: 0;
}
.sidebar-logo:hover { transform: scale(1.08) rotate(-5deg); }
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  width: 100%;
  flex: 1;
}
.nav-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  margin: 0 8px;
  border-radius: 14px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1rem;
  position: relative;
  transition: all .3s ease;
  text-decoration: none;
}
.nav-item i {
  transition: all .3s ease;
}
.nav-item:hover {
  color: var(--text);
  background: var(--bg-glass);
}
.nav-item.active {
  color: var(--crimson);
  background: var(--crimson-glow);
}
.nav-item.active i {
  transform: scale(1.1);
}
.nav-item .tip {
  position: absolute;
  left: calc(100% + 14px);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  padding: 0.25rem 0.8rem;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all .3s ease;
  color: var(--text);
  box-shadow: var(--glass-shadow);
}
.nav-item:hover .tip { opacity: 1; }
.sidebar-bottom {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
}
.theme-toggle-btn {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  background: var(--bg-glass);
  border: 1px solid var(--glass-border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}
.theme-toggle-btn:hover {
  color: var(--text);
  background: var(--glass-bg);
}
.avatar-sb {
  width: 32px;
  height: 32px;
  border-radius: 60px;
  background: linear-gradient(135deg, var(--crimson), var(--rose));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  border: 2px solid var(--glass-border);
  transition: all .3s ease;
}
.avatar-sb:hover { transform: scale(1.06); }

/* ── MAIN ── */
.main {
  margin-left: 96px;
  max-width: 1320px;
  padding: 20px 24px 40px;
  position: relative;
  z-index: 1;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.8rem;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 0.8rem;
}
.topbar-left { display: flex; align-items: center; gap: 0.8rem; }
.topbar-left h2 {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.topbar-left h2 span { color: var(--crimson); }
.topbar-left .sub {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.glass-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: var(--bg-glass);
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.85rem;
  transition: all .3s ease;
  position: relative;
}
.glass-btn:hover {
  border-color: var(--crimson);
  color: var(--crimson);
  background: var(--crimson-glow);
}
.notif-dot {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 8px;
  height: 8px;
  border-radius: 60px;
  background: var(--crimson);
  box-shadow: 0 0 12px var(--crimson);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;}50%{opacity:0.3;} }

.user-chip {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.2rem 0.8rem 0.2rem 0.3rem;
  border-radius: 60px;
  background: var(--bg-glass);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  transition: all .3s ease;
}
.user-chip:hover { border-color: var(--crimson); }
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 60px;
  background: linear-gradient(135deg, var(--crimson), var(--rose));
  color: white;
  font-weight: 700;
  font-size: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.user-name { font-size: 0.75rem; font-weight: 600; color: var(--text); }
.user-role { font-size: 0.55rem; color: var(--text-muted); }

/* ── GLASS CARD ── */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  padding: 1.4rem 1.6rem;
  transition: all .4s ease;
}
.glass-card:hover {
  box-shadow: 0 12px 48px rgba(0,0,0,0.06);
}
.glass-card .head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.glass-card .head h3 {
  font-size: 0.85rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.glass-card .head h3 i { color: var(--crimson); font-size: 0.9rem; }
.badge {
  font-size: 0.55rem;
  font-weight: 600;
  padding: 0.1rem 0.6rem;
  border-radius: 60px;
}
.badge-green { background: var(--sage-glow); color: #1a6b42; }
.badge-red { background: var(--crimson-glow); color: var(--crimson); }
.badge-gold { background: rgba(208,160,85,0.15); color: #8a5a00; }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-blue { background: rgba(56,189,248,0.15); color: #1E40AF; }
.badge-sage { background: var(--sage-glow); color: #1a6b42; }

/* ── HERO ── */
.hero-glass {
  background: linear-gradient(135deg, rgba(10,22,40,0.85), rgba(10,22,40,0.7));
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: 28px;
  padding: 2.2rem 2.8rem;
  margin-bottom: 1.8rem;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .hero-glass {
  background: linear-gradient(135deg, rgba(10,22,40,0.95), rgba(20,10,30,0.85));
}
.hero-glass::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -100px;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,24,60,0.08), transparent 70%);
  pointer-events: none;
}
.hero-glass::after {
  content: '🩸';
  position: absolute;
  bottom: -30px;
  right: 20px;
  font-size: 14rem;
  opacity: 0.03;
  pointer-events: none;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 2.5rem;
  position: relative;
  z-index: 2;
}
.hero-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 600;
  color: white;
  letter-spacing: -0.5px;
}
.hero-left h1 span { color: var(--rose); }
.hero-left .sub {
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
  margin-top: 0.2rem;
}
.hero-tags {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.8rem;
  flex-wrap: wrap;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 0.2rem 0.7rem;
  border-radius: 60px;
}
.tag-blood { background: var(--crimson-glow); color: var(--rose); border: 1px solid rgba(196,24,60,0.2); }
.tag-vital { background: var(--sage-glow); color: var(--sage); border: 1px solid rgba(123,181,151,0.2); }
.tag-gold { background: rgba(208,160,85,0.15); color: var(--gold); border: 1px solid rgba(208,160,85,0.2); }
.tag-sky { background: rgba(56,189,248,0.15); color: var(--sky); border: 1px solid rgba(56,189,248,0.2); }

.hero-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2rem;
}
.readiness-ring {
  position: relative;
  width: 100px;
  height: 100px;
}
.readiness-ring svg { transform: rotate(-90deg); }
.readiness-ring .ring-val {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.readiness-ring .ring-val .num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: white;
}
.readiness-ring .ring-val .lbl {
  font-size: 0.5rem;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.hero-stats {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
  text-align: right;
}
.hero-stats .stat-num {
  font-size: 1.4rem;
  font-weight: 700;
  color: white;
}
.hero-stats .stat-label {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── GRIDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }

/* ── COUNTDOWN ── */
.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.4rem;
  margin: 0.4rem 0 0.2rem;
}
.countdown-item {
  text-align: center;
  padding: 0.4rem;
  background: var(--bg-glass);
  border-radius: 12px;
}
.countdown-item .num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--crimson);
}
.countdown-item .label {
  font-size: 0.5rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── ACHIEVEMENTS ── */
.achievement-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
}
.ach-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.6rem;
  background: var(--bg-glass);
  border-radius: 14px;
  text-align: center;
  transition: all .3s ease;
  opacity: 0.35;
  border: 1px solid transparent;
}
.ach-item.unlocked {
  opacity: 1;
  border-color: var(--glass-border);
}
.ach-item:hover { transform: translateY(-2px); }
.ach-item .icon { font-size: 1.8rem; margin-bottom: 0.1rem; }
.ach-item .name { font-size: 0.55rem; font-weight: 600; color: var(--text); }
.ach-item .desc { font-size: 0.45rem; color: var(--text-muted); }

/* ── HOSPITALS ── */
.hospital-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}
.hospital-card {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.7rem;
  background: var(--bg-glass);
  border-radius: 14px;
  border: 1px solid transparent;
  transition: all .3s ease;
  cursor: pointer;
}
.hospital-card:hover {
  border-color: var(--crimson);
  background: var(--crimson-glow);
}
.hospital-card .h-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--rose-l);
  color: var(--crimson);
  flex-shrink: 0;
  font-size: 0.8rem;
}
.hospital-card .h-info { flex: 1; }
.hospital-card .h-name { font-size: 0.7rem; font-weight: 600; color: var(--text); }
.hospital-card .h-dist { font-size: 0.55rem; color: var(--text-muted); }
.hospital-card .h-status { font-size: 0.5rem; font-weight: 600; padding: 0.05rem 0.4rem; border-radius: 60px; }

/* ── EMERGENCY ── */
.emergency-card {
  border-color: var(--rose-l);
  position: relative;
}
.emergency-card.active {
  background: linear-gradient(135deg, var(--crimson-glow), rgba(196,24,60,0.02));
  border-color: var(--crimson);
}
.em-content { display: flex; align-items: center; gap: 1rem; }
.em-icon {
  width: 48px;
  height: 48px;
  border-radius: 60px;
  background: var(--crimson-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: var(--crimson);
  flex-shrink: 0;
  animation: em-pulse 1.5s infinite;
}
@keyframes em-pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.05);} }
.em-info h4 { font-size: 0.9rem; font-weight: 600; color: var(--text); }
.em-info p { font-size: 0.7rem; color: var(--text-muted); }
.em-meta { display: flex; gap: 0.6rem; margin-top: 0.2rem; flex-wrap: wrap; }
.em-meta span { font-size: 0.6rem; color: var(--slate); display: flex; align-items: center; gap: 0.2rem; }
.em-meta span i { color: var(--crimson); font-size: 0.6rem; }
.em-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
.em-actions button {
  padding: 0.4rem 1.2rem;
  border-radius: 60px;
  font-size: 0.65rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all .3s ease;
}
.btn-primary {
  background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
  color: white;
  box-shadow: 0 4px 20px var(--crimson-glow);
}
.btn-primary:hover { transform: scale(0.97); }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--glass-border);
}
.btn-outline:hover { border-color: var(--crimson); color: var(--crimson); }
.em-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.8rem 0;
  gap: 0.2rem;
}
.em-empty i { font-size: 2.5rem; color: var(--text-muted); opacity: 0.2; }
.em-empty h4 { font-size: 0.85rem; font-weight: 600; color: var(--text); }
.em-empty p { font-size: 0.7rem; color: var(--text-muted); }

/* ── PROFILE ── */
.impact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.8rem;
  padding-top: 0.8rem;
  border-top: 1px solid var(--glass-border);
}
.impact-item {
  background: var(--bg-glass);
  border-radius: 14px;
  padding: 0.6rem;
  text-align: center;
}
.impact-item .num { font-size: 1.3rem; font-weight: 800; }
.impact-item .num.crimson { color: var(--crimson); }
.impact-item .num.sage { color: var(--sage); }
.impact-item .num.gold { color: var(--gold); }
.impact-item .label { font-size: 0.55rem; color: var(--text-muted); }

/* ── QUICK STATS ── */
.quick-stat {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.6rem 0.8rem;
  background: var(--bg-glass);
  border-radius: 14px;
  border: 1px solid transparent;
  transition: all .3s ease;
}
.quick-stat:hover { border-color: var(--glass-border); }
.quick-stat .qs-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.quick-stat .qs-icon.red { background: var(--crimson-glow); color: var(--crimson); }
.quick-stat .qs-icon.green { background: var(--sage-glow); color: var(--sage); }
.quick-stat .qs-icon.gold { background: rgba(208,160,85,0.15); color: var(--gold); }
.quick-stat .qs-icon.purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.quick-stat .qs-info { flex: 1; }
.quick-stat .qs-info .val { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.quick-stat .qs-info .lbl { font-size: 0.55rem; color: var(--text-muted); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: white;
  padding: 0.7rem 1.8rem;
  border-radius: 60px;
  font-size: 0.82rem;
  font-weight: 500;
  box-shadow: 0 8px 28px rgba(10,22,40,.2);
  display: flex;
  align-items: center;
  gap: 0.55rem;
  opacity: 0;
  transition: .3s;

<script>
// ═══════════════════════════════════════════════════════════
//  LUMINALIFE MISSION CONTROL - ULTRA PREMIUM
//  Fully backend-integrated with MongoDB Atlas
// ═══════════════════════════════════════════════════════════

const USER_ID = localStorage.getItem('lifelineUserId') || sessionStorage.getItem('lifelineUserId') || 'D001';
const API_BASE = 'http://127.0.0.1:5000/api';
const $ = id => document.getElementById(id);

// ── STATE ──────────────────────────────────────────────────
let S = {
  profile: { full_name: 'Donor', blood_group: 'O+', total_donations: 0, lives_saved: 0, last_donation_date: null, is_recovered: true, age: 25, weight_kg: 0 },
  health: { hemoglobin: 0, hydration: 0, energy: 0, sleep_hours: 0 },
  emergency: null,
  currentPage: 'dashboard'
};

// ── API ──────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  try {
    const url = `${API_BASE}${path}`;
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json', 'X-User-Id': USER_ID },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('API Error:', e.message);
    return null;
  }
}

// ── PARTICLES ─────────────────────────────────────────────
function initParticles() {
  const canvas = document.getElementById('particles');
  const colors = ['#C4183C', '#F9A8B8', '#7BB597', '#38BDF8', '#D4A055'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      width:${Math.random()*4+2}px;height:${Math.random()*4+2}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;animation-duration:${Math.random()*30+20}s;
      animation-delay:${Math.random()*20}s;opacity:${Math.random()*.08+.04};
    `;
    canvas.appendChild(p);
  }
}

// ── NAVIGATION ────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: 'Mission Control',
  donate: 'Donation Center',
  health: 'Health Status',
  navigation: 'Route Navigation',
  notifications: 'Alert Center',
  profile: 'My Profile',
  settings: 'Settings',
  guidelines: 'Donor Guidelines'
};

const PAGE_ROUTES = {
  dashboard: '/dashboard.html',
  donate: '/donor.html',
  health: '/health.html',
  navigation: '/route-navigation.html',
  notifications: '/notifications.html',
  profile: '/profile.html',
  settings: '/settings.html',
  guidelines: '/guide.html'
};
function navigateTo(page) {
  const url = PAGE_ROUTES[page];
  if (url && url !== window.location.pathname && page !== 'dashboard') {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
    window.location.href = url;
    return;
  }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  // Refresh data when navigating to profile
  if (page === 'profile') {
    loadData();
  }
}

// ── TOAST ──────────────────────────────────────────────────
function toast(msg) {
  const el = $('toast');
  $('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── RENDER PAGES ──────────────────────────────────────────
function renderPage(page) {
  const container = $('pageContent');
  const p = S.profile;
  const h = S.health;
  const name = p.full_name?.split(' ')[0] || 'Donor';
  const hour = new Date().getHours();
  let greeting = 'Good Morning';
  if (hour >= 12 && hour < 17) greeting = 'Good Afternoon';
  else if (hour >= 17 && hour < 21) greeting = 'Good Evening';
  else if (hour >= 21 || hour < 5) greeting = 'Good Night';

  // ── ELIGIBILITY ──
 // ── ELIGIBILITY ──
let isEligible = false;
let days = 0, hours = 0, minutes = 0, seconds = 0;
if (p.last_donation_date) {
  const last = new Date(p.last_donation_date);
  const next = new Date(last);
  next.setDate(next.getDate() + 90);  // ← CHANGE THIS (was 84)
  const now = new Date();
  if (now >= next) isEligible = true;
  else { const diff = Math.floor((next - now) / 1000);
    days = Math.floor(diff / 86400);
    hours = Math.floor((diff % 86400) / 3600);
    minutes = Math.floor((diff % 3600) / 60);
    seconds = diff % 60; }
} else isEligible = true;

  // ── ACHIEVEMENTS ──
  const donations = p.total_donations || 0;

// ── COUNTDOWN ──────────────────────────────────────────────
let countdownInterval = null;

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const p = S.profile;
    if (!p.last_donation_date) { clearInterval(countdownInterval); return; }
    const last = new Date(p.last_donation_date);
    const next = new Date(last);
    next.setDate(next.getDate() + 90);  // ← 56 days is the standard
    const now = new Date();
    if (now >= next) { clearInterval(countdownInterval); renderPage('dashboard'); return; }
    const diff = Math.floor((next - now) / 1000);
    const days = Math.floor(diff / 86400);
    const hours = Math.floor((diff % 86400) / 3600);
    const minutes = Math.floor((diff % 3600) / 60);
    const seconds = diff % 60;
    const nums = document.querySelectorAll('.countdown-item .num');
    if (nums.length === 4) {
      nums[0].textContent = String(days).padStart(2, '0');
      nums[1].textContent = String(hours).padStart(2, '0');
      nums[2].textContent = String(minutes).padStart(2, '0');
      nums[3].textContent = String(seconds).padStart(2, '0');
    }
  }, 1000);
}

// ── EMERGENCY ─────────────────────────────────────────────
async function respondToEmergency() {
  toast('🚨 Responding to emergency…');
  try {
    await apiFetch('/emergency/respond', {
      method: 'POST',
      body: { user_id: USER_ID, emergency_id: S.emergency?.id || 'EMG001', status: 'accepted' }
    });
    toast('✅ Emergency response recorded! Hospital notified.');
  } catch (e) {
    toast('⚠️ Error responding. Please try again.');
  }
}

// ── THEME ──────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('lumina_theme', next);
  const icon = document.getElementById('themeIcon');
  icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

function loadTheme() {
  const saved = localStorage.getItem('lumina_theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    const icon = document.getElementById('themeIcon');
    icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }
}

      is_recovered: profileData.is_recovered !== undefined ? profileData.is_recovered : true,
      donor_status: profileData.donor_status || 'available'
    };

    // Update health
    S.health = {

      exercise_weekly: h.exercise_weekly || 112,

      menstrual_day: h.menstrual_day || 0,
      menstrual_total: 28,
      mood: h.mood || 'good',

    };

    S.emergency = null;

    // Update UI
    const name = S.profile.full_name || 'Donor';
    document.getElementById('userNameEl').textContent = name.split(' ')[0];
    document.getElementById('userRoleEl').textContent = `🩸 ${S.profile.blood_group || 'O+'}`;

    // Determine current page from URL
    const path = window.location.pathname;

    else if (path.includes('health')) page = 'health';
    else if (path.includes('route-navigation')) page = 'navigation';
    else if (path.includes('notifications')) page = 'notifications';
    else if (path.includes('profile')) page = 'profile';
    else if (path.includes('settings')) page = 'settings';
    else if (path.includes('guide')) page = 'guidelines';

    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });
    document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || 'Mission Control';

    renderPage(page);
    document.getElementById('syncTime').textContent = new Date().toLocaleTimeString();
    toast('✅ Connected to LuminaLife Network');

  } catch (e) {
    console.error('Load error:', e);
    toast('⚠️ Loading data…');
  }
}
