<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔔 LuminaLife · Alert Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        /* ════════════════════════════════════════════════════════
           ULTRA PREMIUM GLASSMORPHISM DESIGN - NOTIFICATIONS
        ════════════════════════════════════════════════════════ */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
            --glass-blur: blur(24px) saturate(180%);
            
            --crimson: #C4183C;
            --crimson-glow: rgba(196, 24, 60, 0.15);
            --crimson-l: #E2264F;
            --rose: #F9A8B8;
            --rose-l: #FDDEE5;
            --sage: #7BB597;
            --sage-glow: rgba(123, 181, 151, 0.15);
            --amber: #F0A855;
            --gold: #D4A055;
            --sky: #38BDF8;
            --purple: #8B5CF6;
            --navy: #0A1628;
            --text: #0A1628;
            --text-muted: #6B7280;
            --bg: #F0F2F6;
            --bg-glass: rgba(255,255,255,0.3);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            --bg: #080C18;
            --text: #F2F5FA;
            --text-muted: #94A3B8;
            --bg-glass: rgba(15, 23, 42, 0.3);
            --crimson-glow: rgba(196, 24, 60, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background .4s ease, color .4s ease;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float-particle linear infinite;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1); opacity: 0; }
        }

        .sidebar {
            position: fixed;
            left: 16px;
            top: 16px;
            bottom: 16px;
            width: 64px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.2rem 0;
            z-index: 100;
            transition: all .4s ease;
        }
        .sidebar:hover { background: var(--glass-bg); box-shadow: 0 12px 48px rgba(0,0,0,0.08); }
        .sidebar-logo {
            width: 40px; height: 40px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            color: white;
            box-shadow: 0 4px 20px var(--crimson-glow);
            cursor: pointer;
            transition: all .3s ease;
            margin-bottom: 1.8rem;
            flex-shrink: 0;
        }
        .sidebar-logo:hover { transform: scale(1.08) rotate(-5deg); }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            width: 100%;
            flex: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            margin: 0 8px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            position: relative;
            transition: all .3s ease;
            text-decoration: none;
        }
        .nav-item i { transition: all .3s ease; }
        .nav-item:hover { color: var(--text); background: var(--bg-glass); }
        .nav-item.active { color: var(--crimson); background: var(--crimson-glow); }
        .nav-item.active i { transform: scale(1.1); }
        .nav-item .tip {
            position: absolute;
            left: calc(100% + 14px);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 0.25rem 0.8rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all .3s ease;
            color: var(--text);
            box-shadow: var(--glass-shadow);
        }
        .nav-item:hover .tip { opacity: 1; }
        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        .theme-toggle-btn {
            width: 34px; height: 34px;
            border-radius: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all .3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .theme-toggle-btn:hover { color: var(--text); background: var(--glass-bg); }
        .avatar-sb {
            width: 32px; height: 32px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--crimson), var(--rose));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            border: 2px solid var(--glass-border);
            transition: all .3s ease;
        }
        .avatar-sb:hover { transform: scale(1.06); }

        .main {
            margin-left: 96px;
            max-width: 1320px;
            padding: 20px 24px 40px;
            position: relative;
            z-index: 1;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.8rem;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.8rem; }
        .topbar-left h2 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .topbar-left h2 span { color: var(--crimson); }
        .topbar-left .sub { font-size: 0.7rem; color: var(--text-muted); }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .glass-btn {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: all .3s ease;
            position: relative;
        }
        .glass-btn:hover { border-color: var(--crimson); color: var(--crimson); background: var(--crimson-glow); }
        .notif-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            border-radius: 60px;
            background: var(--crimson);
            box-shadow: 0 0 12px var(--crimson);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1;}50%{opacity:0.3;} }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.2rem 0.8rem 0.2rem 0.3rem;
            border-radius: 60px;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all .3s ease;
        }
        .user-chip:hover { border-color: var(--crimson); }
        .avatar {
            width: 32px; height: 32px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--crimson), var(--rose));
            color: white;
            font-weight: 700;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-name { font-size: 0.75rem; font-weight: 600; color: var(--text); }
        .user-role { font-size: 0.55rem; color: var(--text-muted); }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 1.4rem 1.6rem;
            transition: all .4s ease;
        }
        .glass-card:hover { box-shadow: 0 12px 48px rgba(0,0,0,0.06); }
        .glass-card .head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .glass-card .head h3 {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .glass-card .head h3 i { color: var(--crimson); font-size: 0.9rem; }
        .badge {
            font-size: 0.55rem;
            font-weight: 600;
            padding: 0.1rem 0.6rem;
            border-radius: 60px;
        }
        .badge-green { background: var(--sage-glow); color: #1a6b42; }
        .badge-red { background: var(--crimson-glow); color: var(--crimson); }
        .badge-gold { background: rgba(208,160,85,0.15); color: #8a5a00; }
        .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
        .badge-blue { background: rgba(56,189,248,0.15); color: #1E40AF; }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .filter-chip {
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 600;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all .3s ease;
            color: var(--text-muted);
        }
        .filter-chip:hover { border-color: var(--crimson); color: var(--crimson); }
        .filter-chip.active {
            background: var(--crimson);
            color: white;
            border-color: var(--crimson);
            box-shadow: 0 4px 20px var(--crimson-glow);
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .notification-list::-webkit-scrollbar { width: 4px; }
        .notification-list::-webkit-scrollbar-track { background: var(--bg-glass); border-radius: 10px; }
        .notification-list::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 10px; }

        .notif-item {
            display: flex;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: var(--bg-glass);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: all .3s ease;
            cursor: pointer;
            position: relative;
        }
        .notif-item:hover { border-color: var(--crimson); transform: translateX(4px); }
        .notif-item.unread {
            border-left: 3px solid var(--crimson);
            background: var(--crimson-glow);
        }
        .notif-item .icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border-radius: 12px;
        }
        .notif-item .content { flex: 1; min-width: 0; }
        .notif-item .content .title {
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .notif-item .content .title .unread-badge {
            font-size: 0.5rem;
            background: var(--crimson);
            color: white;
            padding: 0.05rem 0.4rem;
            border-radius: 60px;
        }
        .notif-item .content .message {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            line-height: 1.4;
        }
        .notif-item .content .meta {
            display: flex;
            gap: 0.5rem;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .notif-item .content .meta .tag {
            font-size: 0.5rem;
            padding: 0.05rem 0.5rem;
            border-radius: 60px;
            font-weight: 600;
        }
        .tag-blood { background: var(--crimson-glow); color: var(--crimson); }
        .tag-hospital { background: rgba(56,189,248,0.15); color: #1E40AF; }
        .tag-compatible { background: var(--sage-glow); color: #1a6b42; }
        .tag-priority { background: var(--crimson-glow); color: var(--crimson); }
        .tag-arrived { background: var(--sage-glow); color: #1a6b42; }
        .tag-donation { background: var(--sage-glow); color: #1a6b42; }
        .tag-organ { background: var(--purple); color: white; }

        .notif-item .time {
            font-size: 0.55rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .notif-item .actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            font-size: 0.6rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .3s ease;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
            color: white;
        }
        .action-btn.primary:hover { transform: scale(0.95); }
        .action-btn.outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }
        .action-btn.outline:hover { border-color: var(--crimson); color: var(--crimson); }
        .action-btn.success {
            background: var(--sage);
            color: white;
        }
        .action-btn.success:hover { transform: scale(0.95); }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--text-muted);
            opacity: 0.2;
        }
        .empty-state h4 {
            font-size: 1rem;
            margin-top: 0.5rem;
            color: var(--text-muted);
        }
        .empty-state p {
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--navy);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-size: 0.82rem;
            font-weight: 500;
            box-shadow: 0 8px 28px rgba(10,22,40,.2);
            display: flex;
            align-items: center;
            gap: 0.55rem;
            opacity: 0;
            transition: .3s;
            pointer-events: none;
            z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Arrival Status Card */
        .arrival-section {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--sage-glow);
            border-radius: 16px;
            border: 1px solid var(--sage);
        }
        .arrival-section h4 {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1a6b42;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .arrival-section .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .arrival-section .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-green { background: var(--sage); }
        .dot-red { background: var(--crimson); }
        .dot-yellow { background: var(--gold); }

        /* Category Headers */
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            margin-top: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .category-header h4 {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .category-header .count {
            font-size: 0.55rem;
            background: var(--bg-glass);
            padding: 0.05rem 0.5rem;
            border-radius: 60px;
            color: var(--text-muted);
        }

        @media(max-width:768px){
            .sidebar { left: 8px; top: 8px; bottom: 8px; width: 52px; padding: 0.8rem 0; }
            .sidebar .tip { display: none; }
            .main { margin-left: 68px; padding: 12px; }
            .topbar { padding: 0.6rem 1rem; }
            .user-name { display: none; }
            .notif-item { flex-wrap: wrap; }
        }
        @media(max-width:480px){
            .filter-chips { gap: 0.3rem; }
            .filter-chip { font-size: 0.55rem; padding: 0.2rem 0.7rem; }
        }
    </style>
</head>
<body>

<!-- Floating Particles -->
<div class="particles" id="particles"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
    <div class="sidebar-logo" onclick="navigateTo('dashboard')">
        <i class="fas fa-heart-pulse"></i>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard" onclick="navigateTo('dashboard')">
            <i class="fas fa-grid-2"></i><span class="tip">Dashboard</span>
        </a>
        <a class="nav-item" data-page="donate" onclick="navigateTo('donate')">
            <i class="fas fa-droplet"></i><span class="tip">Donate</span>
        </a>
        <a class="nav-item" data-page="health" onclick="navigateTo('health')">
            <i class="fas fa-heartbeat"></i><span class="tip">Health</span>
        </a>
        <a class="nav-item" data-page="navigation" onclick="navigateTo('navigation')">
            <i class="fas fa-route"></i><span class="tip">Navigate</span>
        </a>
        <a class="nav-item active" data-page="notifications" onclick="navigateTo('notifications')">
            <i class="fas fa-bell"></i><span class="tip">Alerts</span>
        </a>
        <a class="nav-item" data-page="profile" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i><span class="tip">Profile</span>
        </a>
        <a class="nav-item" data-page="settings" onclick="navigateTo('settings')">
            <i class="fas fa-sliders"></i><span class="tip">Settings</span>
        </a>
        <a class="nav-item" data-page="guide" href="/guide.html">
            <i class="fas fa-book"></i><span class="tip">Guidelines</span>
        </a>
    </nav>
    <div class="sidebar-bottom">
        <button class="theme-toggle-btn" id="themeToggle">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <div class="avatar-sb" id="sbAvatar">U</div>
    </div>
</aside>

<!-- ===== MAIN ===== -->
<div class="main">

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="topbar-left">
            <div>
                <h2>Lumina<span>Life</span></h2>
                <div class="sub" id="pageTitle">Alert Center</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="glass-btn" id="notifBtn">
                <i class="fas fa-bell"></i>
                <div class="notif-dot" id="headerNotifDot"></div>
            </div>
            <div class="glass-btn" id="settingsBtn" onclick="navigateTo('settings')">
                <i class="fas fa-sliders"></i>
            </div>
            <div class="user-chip" id="profileChip" onclick="navigateTo('profile')">
                <div class="avatar" id="avatarEl">U</div>
                <div>
                    <div class="user-name" id="userNameEl">Loading...</div>
                    <div class="user-role" id="userRoleEl">🩸 Donor</div>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== NOTIFICATIONS CONTENT ===== -->
    <div class="glass-card">
        <div class="head">
            <h3><i class="fas fa-bell"></i> Alert Center</h3>
            <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
                <span class="badge badge-red" id="unreadCount">0 Unread</span>
                <button class="action-btn primary" onclick="markAllRead()" style="font-size:0.6rem;padding:0.2rem 0.8rem;border:none;border-radius:60px;cursor:pointer;background:var(--crimson);color:white;">
                    <i class="fas fa-check-double"></i> Mark All Read
                </button>
                <button class="action-btn outline" onclick="loadNotifications()" style="font-size:0.6rem;padding:0.2rem 0.8rem;border:1px solid var(--glass-border);border-radius:60px;cursor:pointer;background:transparent;">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="filter-chips" id="filterChips">
            <button class="filter-chip active" data-filter="all">📋 All</button>
            <button class="filter-chip" data-filter="emergency">🚨 Emergency</button>
            <button class="filter-chip" data-filter="donation">❤️ Donations</button>
            <button class="filter-chip" data-filter="arrival">📍 Arrival</button>
            <button class="filter-chip" data-filter="organ">🧬 Organ</button>
            <button class="filter-chip" data-filter="info">💡 Info</button>
        </div>

const USER_ID = localStorage.getItem('lifelineUserId') || sessionStorage.getItem('lifelineUserId') || 'D001';
const API_BASE = 'http://127.0.0.1:5000/api';
const $ = id => document.getElementById(id);

// ── STATE ──────────────────────────────────────────────────
let notifications = [];
let currentFilter = 'all';
let refreshInterval;

// ── TOAST ──────────────────────────────────────────────────
function toast(msg, icon = '✅') {
    const el = $('toast');
    $('toastMsg').textContent = msg;
    el.querySelector('i').className = `fas fa-${icon === '✅' ? 'circle-check' : icon === '❌' ? 'times-circle' : 'info-circle'}`;
    el.querySelector('i').style.color = icon === '✅' ? 'var(--sage)' : icon === '❌' ? 'var(--crimson)' : 'var(--gold)';
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── API ──────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
    try {
        const url = `${API_BASE}${path}`;
        const res = await fetch(url, {
            headers: { 'Content-Type': 'application/json', 'X-User-Id': USER_ID },
            ...opts,
            body: opts.body ? JSON.stringify(opts.body) : undefined
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (e) {
        console.warn('API Error:', e.message);
        return null;
    }
}

function navigateTo(page) {

// ── LOAD NOTIFICATIONS ─────────────────────────────────────
async function loadNotifications() {
    try {
        const result = await apiFetch(`/notifications/${USER_ID}`);
        
        if (result && result.success) {
            notifications = result.notifications.map(n => ({
                id: n.notification_id || n._id,
                title: n.title || 'Notification',
                message: n.message || '',
                type: n.type || 'info',
                priority: n.priority || 'normal',
                is_read: n.is_read || false,
                created_at: n.created_at || n.timestamp || new Date().toISOString(),
                metadata: n.metadata || {},
                icon: getIcon(n.type, n.priority)
            }));
            
            // Sort by created_at (newest first)
            notifications.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            renderNotifications();
            updateUnreadCount();
            updateSyncTime();
        } else {

// ── GET ICON ──────────────────────────────────────────────
function getIcon(type, priority) {
    if (type === 'arrival' || type === 'arrival_confirmed') return '📍';
    if (type === 'emergency_request' || priority === 'critical' || priority === 'high') return '🚨';
    if (type === 'donation_reminder' || type === 'donation_completed') return '❤️';
    if (type === 'health_update') return '🏥';
    if (type === 'donor_response') return '🩸';
    if (type === 'appointment_reminder') return '📅';
    if (type === 'organ_donation' || type === 'organ_donation_reminder') return '🧬';
    return '💡';
}

// ── GET CATEGORY ──────────────────────────────────────────
function getCategory(type) {
    if (type === 'emergency_request' || type === 'emergency_response') return 'emergency';
    if (type === 'donation_completed' || type === 'donation_reminder') return 'donation';
    if (type === 'arrival' || type === 'arrival_confirmed') return 'arrival';
    if (type === 'organ_donation' || type === 'organ_donation_reminder') return 'organ';
    return 'info';
}

// ── GET TIME AGO ──────────────────────────────────────────
function getTimeAgo(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    if (seconds < 10) return 'just now';
    if (seconds < 60) return `${seconds}s ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    return date.toLocaleDateString();
}

async function fixExistingNotifications() {
    try {
        const result = await apiFetch(`/notifications/${USER_ID}`);
        if (!result || !result.success) return;
        
        const allNotifs = result.notifications;
        const fixedHospital = 'Apollo Hospital, Bannerghatta';
        let updatedCount = 0;
        
        for (const notif of allNotifs) {
            if (notif.type === 'donation_completed' || notif.type === 'arrival_confirmed') {
                // Update the message to use Apollo
                const newMessage = notif.type === 'donation_completed' 
                    ? `You successfully completed your donation at ${fixedHospital}. Thank you for saving lives! 🎉`
                    : `You have arrived at ${fixedHospital}. Please check in with the hospital staff.`;
                
                // Update the notification in the database
                await apiFetch(`/notifications/update/${notif.notification_id}`, {
                    method: 'PUT',
                    body: {
                        message: newMessage,
                        metadata: { 
                            ...notif.metadata,
                            hospital_name: fixedHospital,
                            fixed_by: 'system'
                        }
                    }
                });
                updatedCount++;
            }
        }
        
        if (updatedCount > 0) {
            console.log(`✅ Updated ${updatedCount} notifications to use Apollo Hospital`);
            loadNotifications();
        }
    } catch (error) {
        console.error('Error fixing notifications:', error);
    }
}

function renderNotifications() {
    const container = $('notificationList');
    if (!container) return;

    let filtered = notifications;
    if (currentFilter !== 'all') {
        filtered = notifications.filter(n => getCategory(n.type) === currentFilter);
    }

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <h4>${notifications.length === 0 ? 'No Notifications Yet' : 'No notifications in this category'}</h4>
                <p>${notifications.length === 0 ? 'You\'re all caught up! 🎉' : 'Try a different filter'}</p>
            </div>
        `;
        return;
    }

    // Group by category
    const grouped = {};
    filtered.forEach(n => {
        const category = getCategory(n.type);
        if (!grouped[category]) grouped[category] = [];
        grouped[category].push(n);
    });

    // Category labels
    const categoryLabels = {
        emergency: '🚨 Emergency Alerts',
        donation: '❤️ Donations',
        arrival: '📍 Arrivals',
        organ: '🧬 Organ Donation',
        info: '💡 Information'
    };

    let html = '';
    for (const [category, items] of Object.entries(grouped)) {
        html += `
            <div class="category-header">
                <h4>${categoryLabels[category] || category}</h4>
                <span class="count">${items.length}</span>
            </div>
        `;
        
        html += items.map(n => {
            const isUnread = !n.is_read;
            const timeAgo = getTimeAgo(n.created_at);
            const metadata = n.metadata || {};
            
            let tags = '';
            if (metadata.blood_type_needed) {
                tags += `<span class="tag tag-blood">🩸 ${metadata.blood_type_needed}</span>`;
            }
            if (metadata.hospital_name) {
                tags += `<span class="tag tag-hospital">🏥 ${metadata.hospital_name}</span>`;
            }
            if (n.type === 'arrival_confirmed' || n.type === 'donation_completed') {
                tags += `<span class="tag tag-arrived">✅ Completed</span>`;
            }
            if (n.type === 'organ_donation') {
                tags += `<span class="tag tag-organ">🧬 Organ</span>`;
            }
            if (n.priority === 'critical' || n.priority === 'urgent') {
                tags += `<span class="tag tag-priority">🚨 ${n.priority.toUpperCase()}</span>`;
            }

            let actions = '';
            
            if (n.type === 'emergency_request' && metadata.emergency_id) {
                const elig = checkDonorEligibility();
                const isEligible = elig.eligible;
                
                actions = `
                    <div class="actions">
                        <button class="action-btn ${isEligible ? 'primary' : 'outline'}" 
                                onclick="respondToEmergency('${metadata.emergency_id}')"
                                ${isEligible ? '' : 'disabled style="opacity:0.5;cursor:not-allowed;"'}>
                            ${isEligible ? '🩸 Respond Now' : '⛔ Not Eligible'}
                        </button>
                        <button class="action-btn outline" onclick="navigateTo('navigation')">
                            🗺️ Navigate
                        </button>
                    </div>
                `;
            }

            return `
                <div class="notif-item ${isUnread ? 'unread' : ''}" onclick="markAsRead('${n.id}')">
                    <div class="icon">${n.icon}</div>
                    <div class="content">
                        <div class="title">
                            ${isUnread ? '<span class="unread-badge">●</span>' : ''}
                            ${n.title}
                        </div>
                        <div class="message">${n.message}</div>
                        ${tags ? `<div class="meta">${tags}</div>` : ''}
                        ${actions}
                    </div>
                    <div class="time">${timeAgo}</div>
                </div>
            `;
        }).join('');
    }

    container.innerHTML = html;
}

// ── UPDATE UNREAD COUNT ──────────────────────────────────
function updateUnreadCount() {
    const unread = notifications.filter(n => !n.is_read).length;
    const countEl = $('unreadCount');
    const dotEl = $('headerNotifDot');
    
    if (countEl) {
        countEl.textContent = `${unread} Unread`;
        countEl.style.background = unread > 0 ? 'var(--crimson-glow)' : 'var(--sage-glow)';
        countEl.style.color = unread > 0 ? 'var(--crimson)' : '#1a6b42';
    }
    
    if (dotEl) {
        dotEl.style.display = unread > 0 ? 'block' : 'none';
    }
}

// ── MARK AS READ ──────────────────────────────────────────
async function markAsRead(notificationId) {
    try {
        const result = await apiFetch(`/notifications/read/${notificationId}`, {
            method: 'POST'
        });
        
        if (result && result.success) {
            const notif = notifications.find(n => n.id === notificationId);
            if (notif) {
                notif.is_read = true;
                renderNotifications();
                updateUnreadCount();
            }
        }
    } catch (error) {
        console.error('Error marking as read:', error);
    }
}

// ── MARK ALL READ ─────────────────────────────────────────
async function markAllRead() {
    const unreadIds = notifications.filter(n => !n.is_read).map(n => n.id);
    if (unreadIds.length === 0) {
        toast('No unread notifications', '💡');
        return;
    }

    try {
        for (const id of unreadIds) {
            await apiFetch(`/notifications/read/${id}`, { method: 'POST' });
        }
        
        notifications.forEach(n => n.is_read = true);
        renderNotifications();
        updateUnreadCount();
        toast(`✅ Marked ${unreadIds.length} notifications as read`, '✅');
    } catch (error) {
        console.error('Error marking all as read:', error);
        toast('Failed to mark all as read', '❌');
    }
}

// ── CHECK DONOR ELIGIBILITY ──────────────────────────────
function checkDonorEligibility() {
    const profile = JSON.parse(localStorage.getItem('lifelineUserProfile') || '{}');
    
    const hemoglobin = profile.hemoglobin || 0;
    const weight = profile.weight_kg || 0;
    const lastDonation = profile.last_donation_date ? new Date(profile.last_donation_date) : null;
    const today = new Date();
    
    const hbOk = hemoglobin >= 12.5;
    const weightOk = weight >= 50;
    
    let daysSinceDonation = 999;
    if (lastDonation) {
        daysSinceDonation = Math.floor((today - lastDonation) / (1000 * 60 * 60 * 24));
    }
    const gapOk = daysSinceDonation >= 90;
    const eligible = hbOk && weightOk && gapOk;
    
    return {
        eligible,
        hemoglobin,
        weight,
        daysSinceDonation,
        hbOk,
        weightOk,
        gapOk
    };
}

// ── RESPOND TO EMERGENCY ──────────────────────────────────
async function respondToEmergency(emergencyId) {
    try {
        const eligibility = checkDonorEligibility();
        
        if (!eligibility.eligible) {
            let reasons = [];
            if (!eligibility.hbOk) reasons.push(`Hemoglobin: ${eligibility.hemoglobin} g/dL (need ≥12.5)`);
            if (!eligibility.weightOk) reasons.push(`Weight: ${eligibility.weight} kg (need ≥50)`);
            if (!eligibility.gapOk) reasons.push(`Need ${90 - eligibility.daysSinceDonation} more days since last donation`);
            
            toast(`❌ Not eligible to donate:\n${reasons.join('\n')}`, '❌');
            return;
        }
        
        toast('🩸 Sending emergency response...', '⏳');
        
        const profileRes = await apiFetch(`/profile/${USER_ID}`);
        const profile = profileRes?.profile || profileRes || {};
        
        const result = await apiFetch('/emergencies/respond', {
            method: 'POST',
            body: {
                user_id: USER_ID,
                emergency_id: emergencyId,
                donor_name: profile.full_name || 'Donor',
                blood_type: profile.blood_group || 'O+',
                donor_phone: profile.phone || ''
            }
        });
        
        if (result && result.success) {
            toast('✅ Emergency response sent! Hospital notified.', '🚨');
            setTimeout(() => {
                loadNotifications();
                checkArrivalStatus();
            }, 1000);
        } else {
            toast('❌ Failed to respond. Please try again.', '❌');
        }
    } catch (error) {
        console.error('Emergency response error:', error);
        toast('❌ Network error. Please try again.', '❌');
    }
}

// ── FILTER CHIPS ──────────────────────────────────────────
function setupFilters() {
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', function() {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderNotifications();
        });
    });
}

// ── SYNC TIME ─────────────────────────────────────────────
function updateSyncTime() {
    const el = $('syncTime');
    if (el) {
        el.textContent = new Date().toLocaleTimeString();
    }
}

// ── THEME ──────────────────────────────────────────────────
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('lumina_theme', next);
    const icon = document.getElementById('themeIcon');
    icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

function loadTheme() {
    const saved = localStorage.getItem('lumina_theme');
    if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        const icon = document.getElementById('themeIcon');
        icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
}

// ── LOAD USER INFO ─────────────────────────────────────────
async function loadUserInfo() {
    try {
        const result = await apiFetch(`/profile/${USER_ID}`);
        const profile = result?.profile || result || {};
        const name = profile.full_name || 'Donor';
        
        $('userNameEl').textContent = name.split(' ')[0];
        $('userRoleEl').textContent = `🩸 ${profile.blood_group || 'O+'}`;
        $('avatarEl').textContent = name.charAt(0).toUpperCase();
        $('sbAvatar').textContent = name.charAt(0).toUpperCase();
    } catch (error) {
        console.error('Error loading user info:', error);
    }
}

// ── CLEAR DUPLICATE NOTIFICATIONS ──────────────────────────
async function clearDuplicateNotifications() {
    try {
        const result = await apiFetch(`/notifications/${USER_ID}`);
        if (!result || !result.success) return;
        
        const allNotifs = result.notifications;
        
        // Find duplicate donation completion notifications by hospital name
        const completionNotifs = allNotifs.filter(n => n.type === 'donation_completed' || n.type === 'arrival_confirmed');
        
        // Group by hospital name
        const groups = {};
        completionNotifs.forEach(n => {
            const hospitalName = n.metadata?.hospital_name || n.message?.match(/at (.*?)\./)?.[1] || 'unknown';
            if (!groups[hospitalName]) groups[hospitalName] = [];
            groups[hospitalName].push(n);
        });
        
        // Keep only the latest one for each hospital, delete the rest
        let deletedCount = 0;
        for (const hospitalName in groups) {
            if (groups[hospitalName].length > 1) {
                // Sort by created_at (newest first)
                groups[hospitalName].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                // Keep the first (newest), delete the rest
                const toDelete = groups[hospitalName].slice(1);
                for (const notif of toDelete) {
                    await apiFetch(`/notifications/delete/${notif.notification_id}`, {
                        method: 'DELETE'
                    });
                    deletedCount++;
                    console.log(`🗑️ Deleted duplicate donation notification for: ${hospitalName}`);
                }
            }
        }
        
        if (deletedCount > 0) {
            console.log(`✅ Deleted ${deletedCount} duplicate notifications`);
            loadNotifications();
        }
        
    } catch (error) {
        console.error('Error clearing duplicates:', error);
    }
}

// ── INIT ──────────────────────────────────────────────────
function init() {
    loadTheme();
    initParticles();
    loadUserInfo();
    loadNotifications();
    setupFilters();
    
    setTimeout(clearDuplicateNotifications, 2000);
    setTimeout(checkArrivalStatus, 1000);
    
    refreshInterval = setInterval(() => {
        loadNotifications();
        checkArrivalStatus();
    }, 30000);
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    window.navigateTo = navigateTo;
    window.toast = toast;
    window.toggleTheme = toggleTheme;
    window.loadNotifications = loadNotifications;
    window.markAsRead = markAsRead;
    window.markAllRead = markAllRead;
    window.respondToEmergency = respondToEmergency;
    window.markArrived = markArrived;
    window.checkArrivalStatus = checkArrivalStatus;
    window.clearDuplicateNotifications = clearDuplicateNotifications;
    
    console.log('🔔 LuminaLife Notification Center initialized');
    console.log(`📱 User ID: ${USER_ID}`);
    console.log(`🔗 API: ${API_BASE}`);
    console.log('ℹ️ Notifications are ONLY created when you click "I\'ve Arrived"');
}

document.addEventListener('DOMContentLoaded', init);
