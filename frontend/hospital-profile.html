<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Lumina Life - Hospital Profile
</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

:root{

--bg:
linear-gradient(
135deg,
#fff8fa,
#fff1f2,
#fdf2f8
);

--card:
rgba(255,255,255,.88);

--text:#1f2937;

--muted:#6b7280;

}

body.dark{

--bg:
linear-gradient(
135deg,
#0b1220,
#111827,
#1f2937
);

--card:
rgba(17,24,39,.85);

--text:#ffffff;

--muted:#94a3b8;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:var(--bg);

color:var(--text);

min-height:100vh;

padding:24px;

transition:.3s;

}

.topbar{

max-width:1400px;

margin:auto;

display:flex;

justify-content:space-between;

align-items:center;

}

.logo{

font-size:1.7rem;

font-weight:800;

}

.logo span{

color:#ec4899;

}

.nav-actions{

display:flex;

gap:12px;

}

.nav-btn{

padding:12px 18px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

}

.primary{

background:
linear-gradient(
135deg,
#ef4444,
#ec4899
);

color:white;

}

.secondary{

background:
rgba(255,255,255,.1);

color:var(--text);

}

.container{

max-width:1400px;

margin:24px auto;

display:grid;

grid-template-columns:
320px 1fr;

gap:22px;

}

.card{

background:var(--card);

backdrop-filter:blur(20px);

border-radius:28px;

padding:24px;

}

.profile{

text-align:center;

}

.avatar{

width:120px;

height:120px;

border-radius:50%;

margin:auto;

background:
linear-gradient(
135deg,
#ef4444,
#ec4899
);

display:flex;

align-items:center;

justify-content:center;

font-size:2.2rem;

font-weight:800;

color:white;

}

.profile h2{

margin-top:16px;

}

.profile p{

color:var(--muted);

}

.info{

margin-top:20px;

text-align:left;

}

.info div{

margin:12px 0;

}

.edit-btn{

margin-top:20px;

width:100%;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:700;

background:
linear-gradient(
135deg,
#ef4444,
#ec4899
);

color:white;

}

.page-title{

margin-bottom:8px;

}

.page-subtitle{

color:var(--muted);

margin-bottom:25px;

}

.stats{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;

margin-bottom:24px;

}

.stat-card{

padding:20px;

border-radius:18px;

background:
rgba(236,72,153,.08);

}

.stat-card h3{

font-size:2rem;

margin-bottom:6px;

}

.stat-card p{

color:var(--muted);

}

.table-wrapper{

overflow:auto;

border-radius:20px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

padding:16px;

text-align:left;

background:
rgba(236,72,153,.12);

}

td{

padding:16px;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.badge{

padding:8px 12px;

border-radius:999px;

font-size:.85rem;

font-weight:600;

}

.badge-open{

background:
rgba(239,68,68,.15);

color:#ef4444;

}

.badge-completed{

background:
rgba(34,197,94,.15);

color:#22c55e;

}

.badge-scheduled{

background:
rgba(249,115,22,.15);

color:#f97316;

}

.badge-matched{

background:
rgba(59,130,246,.15);

color:#3b82f6;

}

@media(max-width:1100px){

.stats{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.stats{

grid-template-columns:1fr;

}

}

</style>

</head>

<body class="dark">

<div class="topbar">

<div class="logo">
Lumina
<span>Life</span>
</div>

<div class="nav-actions">

<button
class="nav-btn primary"
onclick="
window.location.href=
'hospital-dashboard.html'
">
Dashboard </button>

<button
class="nav-btn primary"
onclick="
window.location.href=
'request-status.html'
">
Request Status </button>

<button
id="themeBtn"
class="nav-btn secondary">
Theme </button>

</div>

</div>

<div class="container">

<div class="card profile">

<div
class="avatar"
id="avatar">
H
</div>

<h2 id="hospitalName">
Hospital Name
</h2>

<p id="hospitalArea">
Area
</p>

<div class="info">

<div>
<strong>Hospital ID:</strong>
<span id="hospitalId">
-
</span>
</div>

<div>
<strong>Email:</strong>
<span id="hospitalEmail">
-
</span>
</div>

<div>
<strong>Area:</strong>
<span id="hospitalArea2">
-
</span>
</div>

<div>
<strong>Status:</strong>
Active
</div>

<div>
<strong>Account Type:</strong>
Hospital
</div>

</div>

<button
class="edit-btn"
id="editProfileBtn">

Edit Profile

</button>

</div>

<div>

<div class="card">

<h1 class="page-title">
Hospital Profile
</h1>

<p class="page-subtitle">
Manage hospital information and review request activity.
</p>

<div class="stats">

<div class="stat-card">

<h3 id="totalRequests">
0
</h3>

<p>
Total Requests
</p>

</div>

<div class="stat-card">

<h3 id="openRequests">
0
</h3>

<p>
Open
</p>

</div>

<div class="stat-card">

<h3 id="matchedRequests">
0
</h3>

<p>
Matched
</p>

</div>

<div class="stat-card">

<h3 id="completedRequests">
0
</h3>

<p>
Completed
</p>

</div>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>
Request ID
</th>

<th>
Type
</th>

<th>
Requirement
</th>

<th>
Priority
</th>

<th>
Status
</th>

</tr>

</thead>

<tbody id="recentRequests">

</tbody>

</table>

</div>

</div>
<!-- Edit Profile Modal -->

<div
id="profileModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
z-index:9999;
">

<div
style="
background:white;
padding:30px;
border-radius:24px;
width:500px;
max-width:92%;
">

<h2>
Edit Profile
</h2>

<label
style="
display:block;
margin-top:20px;
">
Hospital Name </label>

<input
id="editHospitalName"
style="
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
">

<label
style="
display:block;
margin-top:20px;
">
Email </label>

<input
id="editHospitalEmail"
type="email"
style="
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
">

<label
style="
display:block;
margin-top:20px;
">
Area </label>

<select
id="editHospitalArea"
style="
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
">

<option>Koramangala</option>
<option>Whitefield</option>
<option>Indiranagar</option>
<option>Electronic City</option>
<option>Hebbal</option>
<option>Jayanagar</option>
<option>Banashankari</option>
<option>Marathahalli</option>
<option>Yelahanka</option>
<option>Rajajinagar</option>

</select>

<div
style="
display:flex;
gap:10px;
margin-top:24px;
">

<button
class="edit-btn"
id="saveProfileBtn">
Save Changes </button>

<button
class="edit-btn"
style="
background:#6b7280;
"
onclick="
document.getElementById(
'profileModal'
).style.display='none'
">
Cancel </button>

</div>

</div>

</div>

</div>

<script>

/* ==========================
   LOAD PROFILE
========================== */

let hospital =
JSON.parse(
localStorage.getItem(
"hospitalProfile"
)
) || {};

document.getElementById(
"hospitalName"
).innerText =
hospital.name ||
"Hospital";

document.getElementById(
"hospitalEmail"
).innerText =
hospital.email ||
"-";

document.getElementById(
"hospitalArea"
).innerText =
hospital.area ||
"-";

document.getElementById(
"hospitalArea2"
).innerText =
hospital.area ||
"-";

document.getElementById(
"hospitalId"
).innerText =
hospital.hospitalId ||
"HSP-001";

if(hospital.name){

document.getElementById(
"avatar"
).innerText =
hospital.name
.charAt(0)
.toUpperCase();

}

/* ==========================
   EDIT PROFILE
========================== */

document.getElementById(
"editProfileBtn"
).onclick = () => {

document.getElementById(
"editHospitalName"
).value =
hospital.name || "";

document.getElementById(
"editHospitalEmail"
).value =
hospital.email || "";

document.getElementById(
"editHospitalArea"
).value =
hospital.area || "Koramangala";

document.getElementById(
"profileModal"
).style.display =
"flex";

};

document.getElementById(
"saveProfileBtn"
).onclick = () => {

hospital.name =
document.getElementById(
"editHospitalName"
).value.trim();

hospital.email =
document.getElementById(
"editHospitalEmail"
).value.trim();

hospital.area =
document.getElementById(
"editHospitalArea"
).value;

localStorage.setItem(
"hospitalProfile",
JSON.stringify(
hospital
)
);

location.reload();

};

/* ==========================
   REQUEST STATISTICS
========================== */

const requests =
JSON.parse(
localStorage.getItem(
"hospitalRequests"
)
) || [];

document.getElementById(
"totalRequests"
).innerText =
requests.length;

document.getElementById(
"openRequests"
).innerText =
requests.filter(
r => r.status==="Open"
).length;

document.getElementById(
"matchedRequests"
).innerText =
requests.filter(
r => r.status==="Matched"
).length;

document.getElementById(
"completedRequests"
).innerText =
requests.filter(
r => r.status==="Completed"
).length;

/* ==========================
   STATUS BADGES
========================== */

function getBadge(status){

if(status==="Matched"){
return '<span class="badge badge-matched">Matched</span>';
}

if(status==="Scheduled"){
return '<span class="badge badge-scheduled">Scheduled</span>';
}

if(status==="Completed"){
return '<span class="badge badge-completed">Completed</span>';
}

return '<span class="badge badge-open">Open</span>';

}

/* ==========================
   RECENT REQUESTS
========================== */

const table =
document.getElementById(
"recentRequests"
);

requests
.slice(-5)
.reverse()
.forEach(
request => {

const row =
document.createElement(
"tr"
);

row.innerHTML = `
<td>
${request.requestId}
</td>

<td>
${request.requestType}
</td>

<td>
${request.requestType==="Blood"
? request.bloodGroup
: request.organ}
</td>

<td>
${request.priority}
</td>

<td>
${getBadge(request.status)}
</td>
`;

table.appendChild(
row
);

}
);

/* ==========================
   THEME
========================== */

if(
localStorage.getItem(
"theme"
) === "light"
){
document.body.classList.remove(
"dark"
);
}

document.getElementById(
"themeBtn"
).onclick = () => {

document.body.classList.toggle(
"dark"
);

localStorage.setItem(
"theme",
document.body.classList.contains(
"dark"
)
?
"dark"
:
"light"
);

};

</script>

</body>

</html>
