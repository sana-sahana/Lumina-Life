
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:linear-gradient(135deg,#fff8fa,#fff1f2,#fdf2f8);
--card:rgba(255,255,255,.85);
--text:#1f2937;
--muted:#6b7280;
}
body.dark{
--bg:linear-gradient(135deg,#0b1220,#111827,#1f2937);
--card:rgba(17,24,39,.85);
--text:#fff;
--muted:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
.top{max-width:1200px;margin:auto;display:flex;justify-content:space-between}
.theme{padding:12px 18px;border-radius:999px;border:none;cursor:pointer}
.wrap{max-width:1200px;margin:20px auto;display:grid;grid-template-columns:1fr 1.2fr;gap:24px}
.card{background:var(--card);backdrop-filter:blur(20px);border-radius:28px;padding:32px}
h1{font-size:3rem;margin-bottom:12px}
.logo{font-size:1.6rem;font-weight:800}
.logo span{color:#ec4899}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{padding:12px 18px;border:none;border-radius:12px;cursor:pointer}
.active,.btn{background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff}
.form{display:none}.show{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;margin:10px 0 6px}
input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #d1d5db}
.btn{padding:14px 18px;border:none;border-radius:12px;cursor:pointer;font-weight:700;margin-top:18px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.box{background:white;padding:28px;border-radius:24px;width:380px;text-align:center}
.box h3{margin-bottom:10px}
.box p{margin-bottom:16px}
@media(max-width:900px){.wrap,.grid{grid-template-columns:1fr}}
</style>
</head>
<body class="dark">
<div class="top">
<div class="logo">Lumina <span>Life</span></div>
<button id="themeBtn" class="theme">Theme</button>
</div>

<div class="wrap">
<div class="card">
<h1>Hospital Portal</h1>
<p>Create an account and manage donation requests.</p>
</div>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="tab('login',this)">Login</button>
<button class="tab" onclick="tab('register',this)">Register</button>
</div>

<div id="login" class="form show">
<label>Email</label>
<input id="loginEmail" type="email">
<label>Password</label>
<input id="loginPass" type="password">
<button class="btn" onclick="login()">Login</button>
</div>

<div id="register" class="form">
<div class="grid">
<div>
<label>Hospital Name</label>
<input id="hospitalName">
<label>Email</label>
<input id="email" type="email">
<label>Password</label>
<input id="password" type="password">
</div>
<div>
<label>Confirm Password</label>
<input id="confirmPassword" type="password">
<label>Area</label>
<select id="area">
<option>Koramangala</option>
<option>Whitefield</option>
<option>Indiranagar</option>
<option>Electronic City</option>
<option>Hebbal</option>
<option>Jayanagar</option>
<option>Banashankari</option>
<option>Marathahalli</option>
<option>Yelahanka</option>
<option>Rajajinagar</option>
</select>
</div>
</div>
<button class="btn" onclick="register()">Create Account</button>
</div>
</div>
</div>

<div id="modal" class="modal">
<div class="box">
<h3 id="title"></h3>
<p id="msg"></p>
<button id="actionBtn" class="btn" onclick="closeModal()">OK</button>
</div>
</div>

<script>
function tab(id,b){
document.querySelectorAll('.form').forEach(x=>x.classList.remove('show'));
document.getElementById(id).classList.add('show');
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
b.classList.add('active');
}

function showModal(t,m,success=false){
title.innerText=t;
msg.innerText=m;
actionBtn.innerText=success?'Go To Dashboard':'OK';
actionBtn.onclick=success?()=>window.location='hospital-dashboard.html':closeModal;
modal.classList.add('show');
}
function closeModal(){modal.classList.remove('show');}

function register(){
const name=hospitalName.value.trim();
const emailVal=email.value.trim();
const pass=password.value;
const cpass=confirmPassword.value;

if(!name) return showModal('Hospital Name Required','Please enter hospital name.');
if(!emailVal) return showModal('Email Required','Please enter email.');
if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) return showModal('Invalid Email','Please enter a valid email.');
if(!pass) return showModal('Password Required','Please enter password.');
if(pass.length<8) return showModal('Weak Password','Password must be at least 8 characters.');
if(pass!==cpass) return showModal('Passwords Do Not Match','Please ensure both passwords match.');

localStorage.setItem('hospitalProfile',JSON.stringify({
name:name,
email:emailVal,
area:area.value
}));

showModal('Account Created','Hospital account created successfully.',true);
}

function login(){
if(!loginEmail.value.trim()) return showModal('Email Required','Please enter email.');
if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginEmail.value.trim())) return showModal('Invalid Email','Please enter a valid email.');
if(!loginPass.value.trim()) return showModal('Password Required','Please enter password.');
showModal('Login Successful','Proceed to dashboard.',true);
}

if(localStorage.getItem('theme')==='light') document.body.classList.remove('dark');
themeBtn.onclick=()=>{
document.body.classList.toggle('dark');
localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
}
</script>
</body>
</html>
