<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeLine | Emergency Blood & Organ Transport Network</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Routing Machine for directions -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            background: #0a0f1a;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Premium UI */
        .top-bar {
            position: fixed;
            top: 18px;
            left: 18px;
            right: 18px;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .status-chip {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .nav-card {
            position: fixed;
            bottom: 24px;
            left: 18px;
            right: 18px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 200;
            padding: 18px 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .route-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .eta-block {
            display: flex;
            gap: 28px;
        }

        .metric {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #9aa6b9;
        }

        .metric-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        .destination-info {
            text-align: right;
        }

        .hospital-name {
            font-weight: 800;
            font-size: 1rem;
            color: #ffffff;
        }

        .priority-badge {
            background: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 6px;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        @media (max-width: 640px) {
            .metric-value { font-size: 1.2rem; }
            .nav-card { padding: 14px 16px; }
            .eta-block { gap: 16px; }
            .route-info { flex-direction: column; align-items: flex-start; }
            .destination-info { text-align: left; width: 100%; }
        }

        .floating-btn {
            position: fixed;
            right: 20px;
            bottom: 140px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.3rem;
        }

        .floating-btn:hover {
            transform: scale(1.05);
        }

        /* Hospital selector panel */
        .hospital-selector {
            position: fixed;
            left: 18px;
            top: 80px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 12px;
            z-index: 200;
            width: 280px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .hospital-selector h4 {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 10px;
            padding-left: 8px;
        }

        .hospital-item {
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        .hospital-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(3px);
        }

        .hospital-item.emergency {
            border-left: 3px solid #ef4444;
        }

        .hospital-item.blood-need {
            border-left: 3px solid #fbbf24;
        }

        .hospital-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
        }

        .hospital-icon i {
            font-size: 14px;
        }

        .hospital-info {
            flex: 1;
        }

        .hospital-name-item {
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .hospital-detail {
            font-size: 0.65rem;
            color: #9aa6b9;
        }

        .navigate-btn {
            background: #3b82f6;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .navigate-btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {
            .hospital-selector {
                width: 260px;
                max-height: 320px;
                top: 75px;
                left: 12px;
            }
        }

        /* Marker styles */
        .ambulance-marker {
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3), 0 0 0 4px rgba(59, 130, 246, 0.4);
            border: 2px solid #3b82f6;
            animation: float 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .ambulance-marker i {
            font-size: 26px;
            color: #dc2626;
        }

        .emergency-marker {
            border: 3px solid #ef4444;
            background: linear-gradient(135deg, #fee2e2, white);
            animation: red-pulse 1s infinite;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes red-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .blood-need-marker {
            border: 3px solid #fbbf24;
            background: linear-gradient(135deg, #fef3c7, white);
            animation: yellow-glow 1.4s infinite alternate;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes yellow-glow {
            from { box-shadow: 0 0 5px rgba(251, 191, 36, 0.4); }
            to { box-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
        }

        .normal-marker {
            border: 2px solid #eab308;
            background: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
    <div class="status-chip">
        <span class="live-dot"></span>
        <span>🚑 AI Emergency Dispatch Network</span>
    </div>
</div>

<div class="hospital-selector">
    <h4><i class="fas fa-hospital"></i> NEARBY HOSPITALS (Click to Navigate)</h4>
    <div id="hospitalList"></div>
</div>

<div class="floating-btn" id="recenterBtn">
    <i class="fas fa-location-dot"></i>
</div>

<div class="nav-card" id="navCard">
    <div class="route-info">
        <div class="eta-block">
            <div class="metric">
                <span class="metric-label">ETA</span>
                <span class="metric-value" id="etaTime">--:--</span>
            </div>
            <div class="metric">
                <span class="metric-label">DISTANCE</span>
                <span class="metric-value" id="distanceKm">-- km</span>
            </div>
        </div>
        <div class="destination-info">
            <div class="hospital-name" id="destName">Select a hospital</div>
            <div class="priority-badge" id="destStatus"><i class="fas fa-map-marker-alt"></i> Click any hospital to navigate</div>
        </div>
    </div>
</div>

<script>
    // Initialize map
    const map = L.map('map').setView([12.9716, 77.5946], 12);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);
    
    // --- COMPREHENSIVE HOSPITAL DATABASE (20+ hospitals across the city) ---
    const hospitals = [
        // Emergency Hospitals (RED - Critical)
        { id: 1, name: "🏥 City General Hospital", lat: 12.9750, lng: 77.6035, status: "emergency", bloodNeeded: "O+", units: 8, emergencyType: "CRITICAL: Multiple Trauma", address: "Downtown Medical District" },
        { id: 2, name: "🏥 Max Super Speciality", lat: 12.9820, lng: 77.6220, status: "emergency", bloodNeeded: "O-", units: 3, emergencyType: "CRITICAL: Organ Transplant", address: "Eastern Bypass" },
        { id: 3, name: "🏥 Fortis Emergency", lat: 12.9580, lng: 77.6140, status: "emergency", bloodNeeded: "B+", units: 5, emergencyType: "CARDIAC ARREST", address: "Main Road" },
        { id: 4, name: "🏥 Apollo Emergency", lat: 12.9650, lng: 77.5850, status: "emergency", bloodNeeded: "AB+", units: 4, emergencyType: "SEVERE BURNS", address: "Westside" },
        
        // Blood Need Hospitals (YELLOW Glowing)
        { id: 5, name: "🏥 Manipal Hospital", lat: 12.9860, lng: 77.5680, status: "blood_need", bloodNeeded: "A-", units: 7, emergencyType: "BLOOD BANK CRITICAL", address: "North District" },
        { id: 6, name: "🏥 Columbia Asia", lat: 12.9920, lng: 77.5790, status: "blood_need", bloodNeeded: "B-", units: 6, emergencyType: "SURGERY REQUIRED", address: "Sector 5" },
        { id: 7, name: "🏥 Narayana Health", lat: 12.9490, lng: 77.5950, status: "blood_need", bloodNeeded: "AB-", units: 4, emergencyType: "THALASSEMIA PATIENT", address: "South Extension" },
        { id: 8, name: "🏥 Global Hospital", lat: 12.9610, lng: 77.6400, status: "blood_need", bloodNeeded: "O+", units: 10, emergencyType: "MULTIPLE SURGERIES", address: "Tech Park Area" },
        
        // Normal Hospitals
        { id: 9, name: "🏥 St. Mary's Hospital", lat: 12.9550, lng: 77.5500, status: "normal", address: "Old Town" },
        { id: 10, name: "🏥 Lotus Medical Center", lat: 13.0000, lng: 77.6100, status: "normal", address: "Residential Colony" },
        { id: 11, name: "🏥 Sunrise Hospital", lat: 12.9400, lng: 77.5800, status: "normal", address: "Market Road" },
        { id: 12, name: "🏥 Greenfield Clinic", lat: 12.9900, lng: 77.6350, status: "normal", address: "Greenfield Area" },
        { id: 13, name: "🏥 Unity Medical", lat: 12.9450, lng: 77.6050, status: "normal", address: "Unity Boulevard" },
        { id: 14, name: "🏥 Hope Hospital", lat: 13.0100, lng: 77.5900, status: "normal", address: "Hope Town" },
        { id: 15, name: "🏥 Care Institute", lat: 12.9350, lng: 77.6200, status: "normal", address: "Care Colony" }
    ];
    
    // Ambulance starting position
    const ambulanceStart = [12.9580, 77.5760];
    let currentRoutingControl = null;
    let selectedDestination = null;
    
    // Function to calculate distance between two points
    function calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    // Add ambulance marker
    const ambulanceIcon = L.divIcon({
        className: 'ambulance-marker',
        html: '<i class="fas fa-truck-medical"></i>',
        iconSize: [48, 48],
        popupAnchor: [0, -24]
    });
    
    const ambulanceMarker = L.marker(ambulanceStart, { icon: ambulanceIcon, zIndexOffset: 1000 })
        .bindPopup('<b>🚑 Lifeline Ambulance</b><br>Organ: Heart | Blood: O+')
        .addTo(map);
    
    // Add ALL hospital markers to map
    const markerObjects = [];
    
    hospitals.forEach(hospital => {
        let markerClass = '';
        let iconHtml = '<i class="fas fa-hospital"></i>';
        
        if (hospital.status === 'emergency') {
            markerClass = 'emergency-marker';
            iconHtml = '<i class="fas fa-ambulance" style="color:#dc2626; font-size:18px;"></i>';
        } else if (hospital.status === 'blood_need') {
            markerClass = 'blood-need-marker';
            iconHtml = '<i class="fas fa-tint" style="color:#d97706; font-size:16px;"></i>';
        } else {
            markerClass = 'normal-marker';
            iconHtml = '<i class="fas fa-hospital" style="color:#ca8a04; font-size:14px;"></i>';
        }
        
        const customIcon = L.divIcon({
            className: markerClass,
            html: iconHtml,
            iconSize: [38, 38],
            popupAnchor: [0, -19]
        });
        
        const distance = calculateDistance(ambulanceStart[0], ambulanceStart[1], hospital.lat, hospital.lng);
        
        const marker = L.marker([hospital.lat, hospital.lng], { icon: customIcon });
        
        // Build popup content
        let bloodInfo = '';
        if (hospital.bloodNeeded) {
            bloodInfo = `<div style="background:#fef3c7; padding:6px; border-radius:12px; margin-top:6px;">
                            <i class="fas fa-tint" style="color:#d97706;"></i> 
                            <strong>Blood Required:</strong> ${hospital.bloodNeeded} (${hospital.units} units)
                         </div>`;
        }
        
        const popupContent = `
            <div style="font-family:'Inter',sans-serif; min-width:220px; padding:10px;">
                <strong style="font-size:15px;">${hospital.name}</strong><br>
                <span style="font-size:11px; color:#666;">${hospital.address}</span><br>
                ${hospital.status === 'emergency' ? `<div style="color:#dc2626; font-weight:700; margin:6px 0;">🔴 ${hospital.emergencyType}</div>` : ''}
                ${hospital.status === 'blood_need' ? `<div style="color:#d97706; font-weight:600; margin:6px 0;">⚠️ ${hospital.emergencyType}</div>` : ''}
                ${bloodInfo}
                <div style="margin-top:8px;">
                    <button onclick="navigateToHospital(${hospital.id})" style="background:#3b82f6; border:none; padding:6px 14px; border-radius:25px; color:white; cursor:pointer; font-size:12px;">
                        🧭 GET DIRECTIONS
                    </button>
                </div>
                <div style="margin-top:6px; font-size:11px; color:#666;">
                    📍 ${distance.toFixed(1)} km from ambulance
                </div>
            </div>
        `;
        
        marker.bindPopup(popupContent);
        marker.addTo(map);
        
        markerObjects.push({ marker, hospital, distance });
    });
    
    // Function to navigate to selected hospital (Google Maps style)
    window.navigateToHospital = function(hospitalId) {
        const hospital = hospitals.find(h => h.id === hospitalId);
        if (!hospital) return;
        
        selectedDestination = hospital;
        
        // Remove existing routing
        if (currentRoutingControl) {
            map.removeControl(currentRoutingControl);
        }
        
        // Update UI
        document.getElementById('destName').innerHTML = hospital.name;
        let statusText = hospital.status === 'emergency' ? '🔴 EMERGENCY - Immediate Response' : 
                        (hospital.status === 'blood_need' ? '⚠️ BLOOD NEEDED - Urgent' : '🏥 Regular Hospital');
        document.getElementById('destStatus').innerHTML = statusText;
        
        // Calculate route and ETA
        const distance = calculateDistance(ambulanceStart[0], ambulanceStart[1], hospital.lat, hospital.lng);
        const estimatedTime = (distance / 35) * 60; // minutes at avg 35 km/h
        const mins = Math.floor(estimatedTime);
        const secs = Math.floor((estimatedTime - mins) * 60);
        document.getElementById('etaTime').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        document.getElementById('distanceKm').innerText = `${distance.toFixed(1)} km`;
        
        // Add routing control (Google Maps style directions)
        currentRoutingControl = L.Routing.control({
            waypoints: [
                L.latLng(ambulanceStart[0], ambulanceStart[1]),
                L.latLng(hospital.lat, hospital.lng)
            ],
            routeWhileDragging: false,
            showAlternatives: true,
            fitSelectedRoutes: true,
            show: false,  // Don't show the sidebar, just draw the line
            lineOptions: {
                styles: [{ color: '#3b82f6', weight: 5, opacity: 0.9 }],
                extendToWaypoints: true,
                missingRouteTolerance: 0
            },
            router: L.Routing.osrmv1({
                serviceUrl: 'https://router.project-osrm.org/route/v1'
            })
        }).addTo(map);
        
        // Open popup on the selected hospital marker
        const markerObj = markerObjects.find(m => m.hospital.id === hospitalId);
        if (markerObj) {
            markerObj.marker.openPopup();
        }
        
        // Fly to show full route
        const bounds = L.latLngBounds([ambulanceStart, [hospital.lat, hospital.lng]]);
        map.fitBounds(bounds, { padding: [60, 60] });
    };
    
    // Populate hospital list in sidebar
    const hospitalListDiv = document.getElementById('hospitalList');
    
    hospitals.forEach(hospital => {
        const distance = calculateDistance(ambulanceStart[0], ambulanceStart[1], hospital.lat, hospital.lng);
        const itemDiv = document.createElement('div');
        itemDiv.className = `hospital-item ${hospital.status === 'emergency' ? 'emergency' : (hospital.status === 'blood_need' ? 'blood-need' : '')}`;
        
        let iconClass = 'fas fa-hospital';
        let iconColor = '#eab308';
        if (hospital.status === 'emergency') {
            iconClass = 'fas fa-ambulance';
            iconColor = '#ef4444';
        } else if (hospital.status === 'blood_need') {
            iconClass = 'fas fa-tint';
            iconColor = '#fbbf24';
        }
        
        itemDiv.innerHTML = `
            <div class="hospital-icon" style="background: rgba(${hospital.status === 'emergency' ? '239,68,68' : (hospital.status === 'blood_need' ? '251,191,36' : '234,179,8')}, 0.15);">
                <i class="${iconClass}" style="color: ${iconColor};"></i>
            </div>
            <div class="hospital-info">
                <div class="hospital-name-item">${hospital.name.replace('🏥 ', '')}</div>
                <div class="hospital-detail">${hospital.address} • ${distance.toFixed(1)} km</div>
                ${hospital.bloodNeeded ? `<div class="hospital-detail" style="color:#fbbf24;">⚠️ Needs ${hospital.bloodNeeded} blood (${hospital.units} units)</div>` : ''}
                ${hospital.emergencyType ? `<div class="hospital-detail" style="color:#fca5a5;">${hospital.emergencyType}</div>` : ''}
            </div>
            <div class="navigate-btn" onclick="navigateToHospital(${hospital.id})">Navigate</div>
        `;
        
        hospitalListDiv.appendChild(itemDiv);
    });
    
    // Recenter to ambulance
    document.getElementById('recenterBtn').addEventListener('click', () => {
        map.flyTo(ambulanceStart, 14.5, { duration: 1.2 });
        ambulanceMarker.openPopup();
    });
    
    // Fit all hospitals in view
    const allPoints = hospitals.map(h => [h.lat, h.lng]);
    allPoints.push(ambulanceStart);
    const bounds = L.latLngBounds(allPoints);
    map.fitBounds(bounds, { padding: [50, 50] });
    
    // Add zoom control
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    
    // Animate ambulance moving (constant movement simulation)
    let angle = 0;
    setInterval(() => {
        // Subtle floating animation for ambulance marker
        const markerEl = document.querySelector('.ambulance-marker');
        if (markerEl) {
            angle += 0.05;
            const offset = Math.sin(angle) * 2;
            markerEl.style.transform = `translateY(${offset}px)`;
        }
    }, 100);
    
    console.log(`✅ Loaded ${hospitals.length} hospitals on the map`);
    console.log(`📍 Emergency hospitals: ${hospitals.filter(h => h.status === 'emergency').length}`);
    console.log(`🩸 Blood need hospitals: ${hospitals.filter(h => h.status === 'blood_need').length}`);
</script>
</body>
</html>
