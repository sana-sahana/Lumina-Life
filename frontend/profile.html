<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lifeline AI | Emergency Medical Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ========== THEME VARIABLES ========== */
:root {
    --bg-gradient: linear-gradient(145deg, #fff5f5, #ffffff);
    --glass-bg: rgba(255, 255, 255, 0.72);
    --glass-card: rgba(255, 255, 255, 0.75);
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a55;
    --text-muted: #8a8a96;
    --border-light: rgba(255, 80, 80, 0.12);
    --accent: #ff4d4d;
    --accent-dark: #d90429;
    --shadow: 0 25px 60px rgba(255, 80, 80, 0.15);
    --blob1: radial-gradient(circle, #ffb3b3, #ffdede);
    --blob2: radial-gradient(circle, #ff8f8f, #fff0f0);
    --blob3: radial-gradient(circle, #ffcccc, #ffffff);
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(145deg, #0f0f1a, #1a0a0f);
    --glass-bg: rgba(18, 18, 26, 0.72);
    --glass-card: rgba(22, 22, 34, 0.75);
    --text-primary: #f0f0f8;
    --text-secondary: #b0b0c0;
    --text-muted: #8a8a96;
    --border-light: rgba(255, 80, 80, 0.2);
    --accent: #ff6b6b;
    --accent-dark: #ff4d4d;
    --shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    --blob1: radial-gradient(circle, #2a0a14, #1a0a0f);
    --blob2: radial-gradient(circle, #3a0612, #1a0a0f);
    --blob3: radial-gradient(circle, #2a0a14, #0f0f1a);
}

body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    overflow-x: hidden;
    position: relative;
    transition: all 0.3s ease;
}

/* BACKGROUND BLOBS */
.bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
    animation: floatBlob 18s ease-in-out infinite alternate;
}

.blob1 {
    width: 400px;
    height: 400px;
    top: -100px;
    left: -100px;
    background: var(--blob1);
}

.blob2 {
    width: 450px;
    height: 450px;
    bottom: -150px;
    right: -100px;
    background: var(--blob2);
}

.blob3 {
    width: 300px;
    height: 300px;
    top: 40%;
    left: 55%;
    background: var(--blob3);
}

@keyframes floatBlob {
    from {
        transform: translate(0, 0) rotate(0deg);
    }
    to {
        transform: translate(40px, 20px) rotate(10deg);
    }
}

/* MAIN PANEL */
.glass-panel {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 1400px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 40px;
    box-shadow: var(--shadow);
    padding: 30px;
}

/* LAYOUT */
.profile-container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

/* LEFT SECTION */
.avatar-section {
    flex: 1;
    min-width: 320px;
    background: var(--glass-card);
    border-radius: 32px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
}

/* RIGHT SECTION */
.avatar-grid-section {
    flex: 1.6;
    min-width: 350px;
    background: var(--glass-card);
    border-radius: 32px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
}

/* PROFILE PREVIEW */
.profile-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 30px;
}

.avatar-ring {
    position: relative;
    width: 150px;
    height: 150px;
    margin-bottom: 20px;
}

.glow-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
        from 0deg,
        #ff4d4d,
        #ff9999,
        #d90429,
        #ff6666,
        #ffe5e5
    );
    animation: rotateGlow 5s linear infinite;
    filter: blur(4px);
}

@keyframes rotateGlow {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

.profile-img-wrapper {
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    background: white;
    z-index: 2;
    border: 4px solid white;
}

#profileImage {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* INPUTS */
.input-field {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 0 18px;
    margin-bottom: 16px;
    transition: 0.3s;
}

[data-theme="dark"] .input-field {
    background: rgba(30, 30, 40, 0.92);
}

.input-field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.05);
}

.input-field i {
    color: var(--accent-dark);
    font-size: 18px;
}

.input-field input,
.input-field select {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    padding: 16px 0;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
}

.input-field select option {
    background: white;
    color: #1a1a2e;
}

/* UPLOAD CARD */
.upload-card {
    width: 100%;
    text-align: center;
    padding: 18px;
    border-radius: 22px;
    border: 2px dashed rgba(255, 0, 0, 0.2);
    background: rgba(255, 255, 255, 0.75);
    cursor: pointer;
    transition: 0.3s;
}

[data-theme="dark"] .upload-card {
    background: rgba(30, 30, 40, 0.75);
}

.upload-card:hover {
    background: #fff5f5;
    transform: translateY(-2px);
}

[data-theme="dark"] .upload-card:hover {
    background: #2a1a1f;
}

.upload-card i {
    font-size: 28px;
    color: var(--accent-dark);
    margin-bottom: 10px;
}

/* BUTTONS */
.btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 25px;
}

.btn-premium {
    border: none;
    padding: 14px 18px;
    border-radius: 50px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.95);
    color: #b00020;
    font-weight: 600;
    transition: 0.3s;
    flex: 1;
}

.btn-premium:hover {
    transform: translateY(-2px);
}

.btn-save {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white;
}

.btn-loading {
    opacity: 0.7;
    cursor: not-allowed;
}

/* SECTION TITLE */
.section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-dark);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

/* AVATAR GRID */
.avatar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
    gap: 20px;
}

.avatar-option {
    aspect-ratio: 1/1;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    border: 3px solid transparent;
    transition: 0.3s;
    background: white;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
}

.avatar-option:hover {
    transform: scale(1.05);
}

.avatar-option.selected-avatar {
    border-color: var(--accent-dark);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.25);
}

.avatar-option img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TOAST NOTIFICATION */
.toast-notification {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white;
    padding: 16px 24px;
    border-radius: 50px;
    font-weight: 500;
    z-index: 1000;
    animation: slideIn 0.3s ease;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* LOADING SPINNER */
.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* THEME TOGGLE BUTTON */
.theme-toggle {
    position: fixed;
    top: 30px;
    right: 30px;
    z-index: 100;
    width: 50px;
    height: 50px;
    border-radius: 25px;
    background: var(--glass-card);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 24px;
    transition: 0.3s;
}

.theme-toggle:hover {
    transform: scale(1.05);
}

/* MOBILE */
@media (max-width: 900px) {
    .profile-container {
        flex-direction: column;
    }
    .theme-toggle {
        top: 20px;
        right: 20px;
    }
}
</style>
</head>
<body>

<!-- Theme Toggle Button -->
<div class="theme-toggle" id="themeToggle">🌙</div>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<main class="glass-panel">

<div class="profile-container">

<!-- LEFT SECTION -->
<div class="avatar-section">

<div class="profile-preview">

<div class="avatar-ring">

<div class="glow-ring"></div>

<div class="profile-img-wrapper">
<img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png">
</div>

</div>

<div class="upload-card" id="dragUploadZone">

<i class="fas fa-cloud-upload-alt"></i>

<h4>Upload Medical Avatar</h4>

<p style="font-size:13px;color:#666;margin-top:5px;">
JPG • PNG • WEBP
</p>
<input type="file" id="avatarUpload" accept="image/*" style="display:none;">

</div>

</div>

<div class="input-field">
<i class="fas fa-user-circle"></i>
<input type="text" id="fullName" placeholder="Full Name">
</div>

<div class="input-field">
<i class="fas fa-tint"></i>
<select id="bloodGroup">
<option value="">Blood Group</option>
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
<option>A-</option>
<option>B-</option>
<option>O-</option>
<option>AB-</option>
</select>
</div>

<div class="input-field">
<i class="fas fa-phone-alt"></i>
<input type="tel" id="emergencyPhone" placeholder="Emergency Phone">
</div>

<div class="input-field">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="input-field">
<i class="fas fa-map-marker-alt"></i>
<input type="text" id="location" placeholder="Location">
</div>

<div class="btn-group">

<button class="btn-premium" onclick="loginWithGoogle()">
<i class="fab fa-google"></i>
Use Google
</button>

<button class="btn-premium btn-save" id="saveBtn" onclick="saveProfile()">
<i class="fas fa-save"></i>
Save Profile
</button>

</div>

</div>

<!-- RIGHT SECTION -->
<div class="avatar-grid-section">

<div class="section-title">
<i class="fas fa-heartbeat"></i>
Choose Medical Avatar
</div>

<div class="avatar-grid" id="avatarGrid">

</div>

</div>

</div>

</main>

<script>
// ========== THEME TOGGLE ==========
const themeToggle = document.getElementById('themeToggle');
const htmlElement = document.documentElement;

// Load saved theme
const savedTheme = localStorage.getItem('lifeline_theme') || 'light';
htmlElement.setAttribute('data-theme', savedTheme);
themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

themeToggle.addEventListener('click', () => {
    const currentTheme = htmlElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    htmlElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('lifeline_theme', newTheme);
    themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
});

// ========== AVATAR PRESETS ==========
const avatarPresets = [
    "https://i.pinimg.com/736x/9a/d2/5e/9ad25e15e3d881a3fc9bdd2f86b2f740.jpg",
    "https://i.pinimg.com/1200x/a8/7f/bf/a87fbf47a42d2802704782dc5781fc75.jpg",
    "https://i.pinimg.com/736x/ed/76/db/ed76db19045a7b9469404866ddbb3d9e.jpg",
    "https://i.pinimg.com/1200x/33/86/2c/33862cb803e0c990eff517beadd1cf72.jpg"
];

const avatarGrid = document.getElementById("avatarGrid");
const profileImage = document.getElementById("profileImage");
let selectedAvatarUrl = avatarPresets[0];

// Populate avatar grid
avatarPresets.forEach(url => {
    const div = document.createElement("div");
    div.className = "avatar-option";
    const img = document.createElement("img");
    img.src = url;
    div.appendChild(img);
    div.addEventListener("click", () => {
        document.querySelectorAll(".avatar-option").forEach(el => el.classList.remove("selected-avatar"));
        div.classList.add("selected-avatar");
        profileImage.src = url;
        selectedAvatarUrl = url;
    });
    avatarGrid.appendChild(div);
});

// Select first avatar by default
if(avatarGrid.firstChild) {
    avatarGrid.firstChild.classList.add("selected-avatar");
}

// ========== IMAGE UPLOAD FUNCTIONALITY ==========
const uploadZone = document.getElementById("dragUploadZone");
const fileInput = document.getElementById("avatarUpload");

uploadZone.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            profileImage.src = event.target.result;
            selectedAvatarUrl = event.target.result;
            showToast("Avatar uploaded successfully!", "success");
        };
        reader.readAsDataURL(file);
    }
});

// Drag and drop
uploadZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadZone.style.background = "#fff0f0";
});

uploadZone.addEventListener("dragleave", () => {
    uploadZone.style.background = "rgba(255,255,255,0.75)";
});

uploadZone.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadZone.style.background = "rgba(255,255,255,0.75)";
    const file = e.dataTransfer.files[0];
    if(file && file.type.startsWith("image/")) {
        const reader = new FileReader();
        reader.onload = function(event) {
            profileImage.src = event.target.result;
            selectedAvatarUrl = event.target.result;
            showToast("Avatar uploaded successfully!", "success");
        };
        reader.readAsDataURL(file);
    } else {
        showToast("Please upload an image file", "error");
    }
});

// ========== LOAD PROFILE FROM BACKEND ==========
async function loadProfile() {
    try {
        const userId = localStorage.getItem("lifelineUserId") || "user_123";
        const response = await fetch(`http://127.0.0.1:5000/api/profile/${userId}`);
        
        if(response.ok) {
            const data = await response.json();
            if(data.profile) {
                document.getElementById("fullName").value = data.profile.fullName || "";
                document.getElementById("bloodGroup").value = data.profile.bloodGroup || "";
                document.getElementById("emergencyPhone").value = data.profile.phone || "";
                document.getElementById("email").value = data.profile.email || "";
                document.getElementById("location").value = data.profile.location || "";
                if(data.profile.avatar && data.profile.avatar !== profileImage.src) {
                    profileImage.src = data.profile.avatar;
                    selectedAvatarUrl = data.profile.avatar;
                }
                showToast("Profile loaded successfully!", "success");
            }
        }
    } catch(error) {
        console.log("No existing profile found, using defaults");
    }
}

// ========== SAVE PROFILE TO BACKEND ==========
async function saveProfile() {
    const fullName = document.getElementById("fullName").value.trim();
    const bloodGroup = document.getElementById("bloodGroup").value;
    const phone = document.getElementById("emergencyPhone").value.trim();
    const email = document.getElementById("email").value.trim();
    const location = document.getElementById("location").value.trim();
    
    // Validation
    if(!fullName) {
        showToast("Please enter your full name", "error");
        return;
    }
    if(!bloodGroup || bloodGroup === "") {
        showToast("Please select your blood group", "error");
        return;
    }
    if(!phone) {
        showToast("Please enter emergency phone number", "error");
        return;
    }
    if(!email || !email.includes('@')) {
        showToast("Please enter a valid email address", "error");
        return;
    }
    if(!location) {
        showToast("Please enter your location", "error");
        return;
    }
    
    const saveBtn = document.getElementById("saveBtn");
    const originalHTML = saveBtn.innerHTML;
    saveBtn.innerHTML = '<span class="spinner"></span>Saving...';
    saveBtn.disabled = true;
    saveBtn.classList.add("btn-loading");
    
    const profileData = {
        userId: localStorage.getItem("lifelineUserId") || `user_${Date.now()}`,
        fullName: fullName,
        bloodGroup: bloodGroup,
        phone: phone,
        email: email,
        location: location,
        avatar: selectedAvatarUrl,
        createdAt: new Date().toISOString()
    };
    
    try {
        const response = await fetch("http://127.0.0.1:5000/api/profile", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(profileData)
        });
        
        const result = await response.json();
        
        if(response.ok) {
            localStorage.setItem("lifelineUserId", profileData.userId);
            localStorage.setItem("lifelineUserProfile", JSON.stringify(profileData));
            showToast("✅ Profile saved successfully! Redirecting to dashboard...", "success");
            
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } else {
            showToast(result.error || "Error saving profile", "error");
            saveBtn.innerHTML = originalHTML;
            saveBtn.disabled = false;
            saveBtn.classList.remove("btn-loading");
        }
    } catch(error) {
        console.error("Save error:", error);
        showToast("⚠️ Network error. Saving locally...", "error");
        
        // Fallback to localStorage
        localStorage.setItem("lifelineUserProfile", JSON.stringify(profileData));
        localStorage.setItem("lifelineUserId", profileData.userId);
        
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    }
}

// ========== GOOGLE SIGN-IN SIMULATION ==========
function loginWithGoogle() {
    showToast("🔐 Google Sign-In integration ready for production", "info");
    // In production, implement actual Google OAuth
}

// ========== TOAST NOTIFICATION ==========
function showToast(message, type = "success") {
    const toast = document.createElement("div");
    toast.className = "toast-notification";
    toast.innerHTML = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// ========== LOAD PROFILE ON PAGE LOAD ==========
loadProfile();
</script>
</body>
</html>
