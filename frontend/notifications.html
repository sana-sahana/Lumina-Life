
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>VeinAI | Emergency Command Center – Live Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Inter', system-ui, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f4f6fc;
            transition: background 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-x: hidden;
        }

        /* Dark theme variables */
        body.dark {
            background: #0b0e14;
        }

        /* main app container */
        .app {
            min-height: 100vh;
            width: 100%;
            position: relative;
        }

        /* glass overlay for modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
            opacity: 1;
        }

        .glass-modal {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(28px);
            border-radius: 48px;
            width: 90%;
            max-width: 420px;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.5);
            animation: floatModal 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            transition: all 0.2s;
        }

        body.dark .glass-modal {
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(28px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1);
        }

        @keyframes floatModal {
            0% { opacity: 0; transform: scale(0.96) translateY(20px);}
            100% { opacity: 1; transform: scale(1) translateY(0);}
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .glass-modal h2 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e2b3c, #0f2b3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        body.dark .glass-modal h2 {
            background: linear-gradient(135deg, #e0f0ff, #b0d4ff);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .modal-desc {
            margin: 16px 0 28px;
            color: #2c3e44;
            font-weight: 450;
        }

        body.dark .modal-desc {
            color: #cddcec;
        }

        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .btn-allow {
            background: #007aff;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,122,255,0.3);
        }

        .btn-later {
            background: rgba(150,150,160,0.2);
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(0,0,0,0.1);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        /* main UI after permission */
        .notification-hub {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 32px;
        }

        /* header premium */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .logo-area h1 {
            font-weight: 650;
            font-size: 1.7rem;
            letter-spacing: -0.4px;
            background: linear-gradient(120deg, #004e7c, #0096c7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .live-badge {
            background: #ff3b30;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulseLive 1.5s infinite;
        }

        @keyframes pulseLive {
            0% { opacity: 0.7; box-shadow: 0 0 0 0 #ff3b3077; }
            70% { opacity: 1; box-shadow: 0 0 0 6px rgba(255,59,48,0); }
            100% { opacity: 0.7; }
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .theme-toggle, .sound-toggle, .filter-icon {
            background: rgba(255,255,240,0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 8px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        body.dark .theme-toggle, body.dark .sound-toggle, body.dark .filter-icon {
            background: rgba(30,40,55,0.7);
            color: #eef4ff;
        }

        /* filter chips */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            align-items: center;
            justify-content: space-between;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chip {
            background: rgba(230,240,255,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.dark .chip {
            background: rgba(40, 50, 70, 0.7);
            color: #eef;
        }

        .chip.active {
            background: #007aff;
            color: white;
            box-shadow: 0 6px 14px rgba(0,122,255,0.3);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 8px 14px;
            border-radius: 32px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        /* notification feed */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 12px;
        }

        .notification-card {
            background: rgba(255,255,245,0.75);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 18px 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05), 0 0 0 0.5px rgba(255,255,255,0.6);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transform-origin: top;
            animation: slideIn 0.35s ease-out;
        }

        body.dark .notification-card {
            background: rgba(28, 35, 48, 0.8);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-icon {
            font-size: 2rem;
            min-width: 52px;
            text-align: center;
        }

        .card-content {
            flex: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }

        .title-cat {
            font-weight: 650;
            font-size: 1rem;
        }

        .time {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .message-preview {
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.4;
        }

        .status-tag {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* priority styles */
        .priority-urgent {
            border-left: 5px solid #ff3b30;
            background: rgba(255,59,48,0.08);
            animation: softPulse 1.2s infinite;
        }
        .priority-high {
            border-left: 5px solid #ff9500;
            background: rgba(255,149,0,0.05);
        }
        .priority-success {
            border-left: 5px solid #34c759;
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.3); border-left-color: #ff3b30; }
            70% { box-shadow: 0 0 0 6px rgba(255,59,48,0); border-left-color: #ff6b5e; }
            100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
        }

        /* unread indicator */
        .unread-dot {
            width: 8px;
            height: 8px;
            background: #007aff;
            border-radius: 10px;
            display: inline-block;
            margin-right: 8px;
        }

        /* mobile swipe */
        @media (max-width: 680px) {
            .notification-hub { padding: 16px; }
            .notification-card { padding: 14px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .card-icon { font-size: 1.6rem; min-width: 42px; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- permission modal -->
    <div id="permissionModal" class="modal-backdrop">
        <div class="glass-modal">
            <div class="modal-icon">🚨❤️</div>
            <h2>Emergency Notifications</h2>
            <p class="modal-desc">Real‑time AI alerts for blood donation & organ transport. Stay life‑saving critical updates.</p>
            <div class="button-group">
                <button class="btn-allow" id="allowBtn">Allow Notifications</button>
                <button class="btn-later" id="laterBtn">Maybe Later</button>
            </div>
        </div>
    </div>

    <!-- Main Notification Hub -->
    <div id="notificationHub" class="notification-hub">
        <div class="header-bar">
            <div class="logo-area">
                <h1>VeinAI Command</h1>
                <div class="live-badge">● LIVE AI</div>
            </div>
            <div class="controls">
                <div class="theme-toggle" id="themeToggleBtn">🌓 Light/Dark</div>
                <div class="sound-toggle" id="soundToggleBtn">🔊 Sound On</div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-chips" id="filterChips">
                <div class="chip active" data-filter="all">All</div>
                <div class="chip" data-filter="Emergency">🚨 Emergency</div>
                <div class="chip" data-filter="Hospital">🏥 Hospital</div>
                <div class="chip" data-filter="Donor">❤️ Donor</div>
                <div class="chip" data-filter="Transport">🚑 Transport</div>
                <div class="chip" data-filter="AI Assistant">🤖 AI Alert</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="markAllReadBtn">✓ Mark all read</button>
                <button class="action-btn" id="clearAllBtn">🗑 Clear all</button>
            </div>
        </div>

        <div class="feed-container" id="feedContainer">
            <!-- dynamic notifications injected here -->
            <div style="text-align:center; padding: 40px; opacity:0.6;">Loading live command feed…</div>
        </div>
    </div>
</div>

<script>
    // ---------- SMART AI CLASSIFICATION + PRIORITY ENGINE ----------
    const categoriesMapping = {
        "Emergency": { keywords: ["urgent", "critical", "immediate", "blood shortage", "crash", "organ transport emergency", "code red", "severe"], priority: "urgent", icon: "🚨", glow: "priority-urgent" },
        "Hospital": { keywords: ["hospital", "icu", "blood bank", "stock update", "emergency room"], priority: "normal", icon: "🏥", glow: "" },
        "Donor": { keywords: ["donor", "match found", "donation accepted", "nearby donor", "blood type", "willing to donate"], priority: "high", icon: "❤️", glow: "priority-high" },
        "Transport": { keywords: ["ambulance", "organ transport", "eta", "en route", "route update", "transport dispatched"], priority: "urgent", icon: "🚑", glow: "priority-urgent" },
        "Navigation": { keywords: ["arrived", "traffic alert", "recalculated", "destination reached", "gps"], priority: "normal", icon: "📍", glow: "" },
        "AI Assistant": { keywords: ["ai suggests", "priority prediction", "smart match", "recommendation", "intelligent"], priority: "normal", icon: "🤖", glow: "" }
    };

    function classifyNotification(text, title) {
        const lower = (text + " " + title).toLowerCase();
        for (let [cat, config] of Object.entries(categoriesMapping)) {
            if (config.keywords.some(kw => lower.includes(kw))) {
                return { category: cat, priority: config.priority, icon: config.icon, extraClass: config.glow };
            }
        }
        return { category: "AI Assistant", priority: "normal", icon: "🤖", extraClass: "" };
    }

    // mock real-time data generator with realistic emergency scenarios
    let notificationStore = [];
    let nextId = 1;
    let soundEnabled = true;
    let currentFilter = "all";
    let updateInterval;
    let audioCtxAllowed = false;
    let playSound = (type = 'urgent') => {
        if (!soundEnabled) return;
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            if (type === 'urgent') { osc.frequency.value = 880; gain.gain.value = 0.2; osc.type = 'sine'; }
            else { osc.frequency.value = 540; gain.gain.value = 0.1; osc.type = 'sine'; }
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.4);
            osc.stop(audioContext.currentTime + 0.35);
        } catch(e) {}
    };

    // generate random life-like notification
    const templates = [
        { title: "Emergency Blood Request", msg: "Type O- urgent requirement at City Hospital. 3 units needed within 45 mins.", catHint: "Emergency" },
        { title: "Organ Transport Alert", msg: "Heart transport initiated. Ambulance en route from AIIMS to Fortis. ETA 22 min.", catHint: "Transport" },
        { title: "Donor Match Found", msg: "AI matched B+ donor 2km away. Donor is ready to proceed.", catHint: "Donor" },
        { title: "ICU Bed Availability", msg: "3 ICU beds available at Apollo Central. Critical care ready.", catHint: "Hospital" },
        { title: "Traffic Update", msg: "Ambulance route altered due to congestion. +7 min ETA.", catHint: "Navigation" },
        { title: "AI Prediction", msg: "High probability of organ acceptance within 30 minutes. Prepare transport team.", catHint: "AI Assistant" },
        { title: "Blood Stock Critical", msg: "B− blood supply running low. Urgent donor appeal issued.", catHint: "Emergency" },
        { title: "Nearby Donor Responded", msg: "Volunteer donor en route to donation center. Estimated 12min.", catHint: "Donor" }
    ];

    function generateRandomNotif() {
        const template = templates[Math.floor(Math.random() * templates.length)];
        const classification = classifyNotification(template.msg, template.title);
        const priorityLevel = classification.priority;
        const isUrgent = (priorityLevel === 'urgent');
        return {
            id: nextId++,
            title: template.title,
            message: template.msg,
            timestamp: new Date(),
            read: false,
            category: classification.category,
            priority: priorityLevel,
            icon: classification.icon,
            extraClass: classification.extraClass,
            isUrgentAlert: isUrgent
        };
    }

    function addNotification(notif, animate = true) {
        notificationStore.unshift(notif);
        renderFeed();
        if (notif.priority === 'urgent') {
            playSound('urgent');
            // browser push notification if permission granted
            if (Notification.permission === 'granted') {
                new Notification("🚨 VeinAI Emergency", { body: notif.title + " – " + notif.message.slice(0, 80), icon: "https://cdn-icons-png.flaticon.com/512/190/190411.png" });
            }
        } else if (notif.priority === 'high') playSound('normal');
        else if (notif.category === 'Donor') playSound('normal');
    }

    function renderFeed() {
        const container = document.getElementById('feedContainer');
        if (!container) return;
        let filtered = notificationStore;
        if (currentFilter !== "all") {
            filtered = notificationStore.filter(n => n.category === currentFilter);
        }
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:48px; background:rgba(0,0,0,0.03); border-radius:48px;">✨ No notifications in this category. Stay tuned for live updates.</div>`;
            return;
        }
        container.innerHTML = filtered.map(notif => {
            const timeAgo = getTimeAgo(notif.timestamp);
            const priorityClass = notif.priority === 'urgent' ? 'priority-urgent' : (notif.priority === 'high' ? 'priority-high' : (notif.priority === 'success' ? 'priority-success' : ''));
            const unreadMark = !notif.read ? `<span class="unread-dot"></span>` : '';
            return `
                <div class="notification-card ${priorityClass} ${notif.extraClass}" data-id="${notif.id}" data-read="${notif.read}">
                    <div class="card-icon">${notif.icon}</div>
                    <div class="card-content">
                        <div class="card-header">
                            <div class="title-cat">${unreadMark} ${notif.title} <span class="status-tag">${notif.category}</span></div>
                            <div class="time">${timeAgo}</div>
                        </div>
                        <div class="message-preview">${notif.message}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                            <span style="font-size:0.7rem; font-weight:500;">${notif.priority.toUpperCase()} priority</span>
                            <button class="mark-read-single" data-id="${notif.id}" style="background:none; border:none; font-size:0.7rem; cursor:pointer;">✓ Mark read</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // attach single read event
        document.querySelectorAll('.mark-read-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const notif = notificationStore.find(n => n.id === id);
                if (notif) notif.read = true;
                renderFeed();
            });
        });
        // click on card to mark as read (optional)
        document.querySelectorAll('.notification-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('mark-read-single')) return;
                const id = parseInt(card.getAttribute('data-id'));
                const notif = notificationStore.find(n => n.id === id);
                if(notif) notif.read = true;
                renderFeed();
            });
        });
    }

    function getTimeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 10) return 'just now';
        if (seconds < 60) return `${seconds}s ago`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        return `${hours}h ago`;
    }

    function markAllRead() {
        notificationStore.forEach(n => n.read = true);
        renderFeed();
    }

    function clearAll() {
        notificationStore = [];
        renderFeed();
    }

    // Real-time interval; 5 to 12 seconds random realistic updates
    function startRealTimeFeed() {
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => {
            const newNotif = generateRandomNotif();
            addNotification(newNotif);
            // optional auto scroll effect
        }, Math.random() * 7000 + 5000);
        // initial seed notifications for premium feel
        setTimeout(() => {
            if(notificationStore.length === 0) {
                addNotification(generateRandomNotif());
                addNotification(generateRandomNotif());
                addNotification(generateRandomNotif());
            }
        }, 100);
    }

    // ---------- Permission + Modal ----------
    const modal = document.getElementById('permissionModal');
    const hub = document.getElementById('notificationHub');
    let notificationPermissionGranted = false;

    function requestBrowserPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') console.log('push enabled');
            });
        }
    }

    function initMainApp() {
        modal.style.display = 'none';
        hub.style.display = 'block';
        startRealTimeFeed();
        // if browser permission not yet asked, trigger
        if(Notification.permission === 'default') requestBrowserPermission();
        else if(Notification.permission === 'granted') {}
    }

    document.getElementById('allowBtn').addEventListener('click', () => {
        if ('Notification' in window) {
            Notification.requestPermission().then(perm => {
                initMainApp();
            }).catch(() => initMainApp());
        } else {
            initMainApp();
        }
    });
    document.getElementById('laterBtn').addEventListener('click', () => {
        initMainApp();  // proceed without browser push but still real-time UI
    });

    // Filter chips
    function setupFilters() {
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.getAttribute('data-filter');
                renderFeed();
            });
        });
        document.getElementById('markAllReadBtn').addEventListener('click', markAllRead);
        document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    }

    // Theme switcher (dark/light)
    const themeBtn = document.getElementById('themeToggleBtn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('veinTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('veinTheme') === 'dark') document.body.classList.add('dark');

    const soundToggle = document.getElementById('soundToggleBtn');
    soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.innerHTML = soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";
    });

    // touch swipe for mobile (simple detection removal)
    let touchStart = null;
    document.addEventListener('touchstart', (e) => { touchStart = e.changedTouches[0].clientX; });
    document.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        const diff = e.changedTouches[0].clientX - touchStart;
        if (Math.abs(diff) > 70) {
            // swipe left/right just for UX, no conflict
        }
        touchStart = null;
    });

    setupFilters();
    // initial dummy to avoid empty but modal covers first
    window.addEventListener('load', () => {
        // preload theme
    });
</script>
</body>
</html>
