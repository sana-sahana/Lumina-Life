<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LifeLink Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* 🌈 UNICORN BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ffc8dd,#cdb4db,#bde0fe,#fff1a8);
  overflow:hidden;
}

/* 🫧 SOFT FLOATING BLOBS */
body::before, body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.6;
}

body::before{
  background:#ffc8dd;
  top:10%;
  left:15%;
}

body::after{
  background:#bde0fe;
  bottom:10%;
  right:15%;
}

/* 🌸 MODAL CONTAINER */
.container{
  width:900px;
  height:500px;
  display:flex;
  border-radius:30px;
  overflow:hidden;
  backdrop-filter:blur(30px);
  background: rgba(255,255,255,0.2);
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

/* 🖼️ LEFT IMAGE SIDE */
.left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: linear-gradient(135deg,#ffc8dd,#cdb4db);
  position:relative;
}

/* aesthetic image */
.left img{
  width:220px;
  animation:float 6s ease-in-out infinite;
}

/* floating animation */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

.left h2{
  margin-top:20px;
  color:white;
  font-weight:500;
}

/* 🌿 RIGHT FORM */
.right{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* FORM */
.form{display:none;}
.form.active{display:block;}

h2{
  color:#5a189a;
  margin-bottom:10px;
}

p{
  color:#666;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:15px;
  border:none;
  background: rgba(255,255,255,0.7);
  outline:none;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background: linear-gradient(135deg,#ffafcc,#a0c4ff);
  color:white;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* GOOGLE */
.google{
  margin-top:10px;
  padding:12px;
  border-radius:15px;
  background: rgba(255,255,255,0.7);
  text-align:center;
  cursor:pointer;
}

/* TOGGLE */
.toggle{
  margin-top:15px;
  font-size:14px;
  color:#5a189a;
  cursor:pointer;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png">
    <h2>Spread Love 💗</h2>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- LOGIN -->
    <div id="login" class="form active">
      <h2>Welcome Back 🌸</h2>
      <p>Login to continue your journey</p>

      <input placeholder="Email">
      <input placeholder="Password" type="password">

      <button class="btn">Sign In</button>

      <div class="google">Continue with Google</div>

      <div class="toggle" onclick="showSignup()">Create Account</div>
    </div>

    <!-- SIGNUP -->
    <div id="signup" class="form">
      <h2>Create Account 💫</h2>
      <p>Join the donor community</p>

      <input placeholder="Name">
      <input placeholder="Email">
      <input placeholder="Phone">
      <input placeholder="Password" type="password">

      <button class="btn">Sign Up</button>

      <div class="google">Sign up with Google</div>

      <div class="toggle" onclick="showLogin()">Already have account?</div>
    </div>

  </div>

</div>

<script>
function showSignup(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("signup").classList.add("active");
}

function showLogin(){
  document.getElementById("signup").classList.remove("active");
  document.getElementById("login").classList.add("active");
}
</script>

</body>
</html>
